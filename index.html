<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>De Koppelbaas — ARD</title>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root {
      --bg: #fafaf9; --header: #d9a300; --headerTxt: #000; --headerSub: #00000088; --headerDiv: #00000033;
      --panelBg: #fff; --kaart: #fff; --kaartBorder: #e8e7e4; --selBg: #fff; --footerBg: #fff;
      --txtPrimary: #000; --txtSecondary: #878786; --zachtgrijs: #e8e7e4; --lichtgrijs: #f4f3f1;
      --geel: #d9a300; --grijs: #878786; --blauw: #006f9d; --rood: #c22d0b; --groen: #007b2f; --oranje: #c97b1a;
      --modalBg: #fff; --modalOverlay: rgba(0,0,0,0.4); --inputBorder: #e8e7e4;
      --badgeBg: #2a2a2a; --badgeTxt: #fff;
      --devSelBg: #000; --devSelTxt: #fff; --devSelBorder: #d9a300;
      --devHlBg: #e8f5e9; --devHlBorder: #007b2f;
      --catGroupBg: #f7f6f4; --catHeaderBg: #eeedea;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Rubik','Helvetica Neue',sans-serif; background: var(--bg); color: var(--txtPrimary); min-height: 100vh; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: var(--zachtgrijs); border-radius: 3px; }
    input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type="number"] { -moz-appearance: textfield; }

    /* Login */
    #login-screen { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; }
    #login-screen .logo { color: #fff; text-align: center; margin-bottom: 30px; }
    #login-screen .logo-ard { font-size: 42px; font-weight: 700; letter-spacing: 5px; }
    #login-screen .logo-sub { font-size: 10px; font-weight: 300; letter-spacing: 3px; color: #ffffff66; margin-top: 4px; }
    #login-screen input { width: 260px; padding: 10px 14px; font-size: 14px; border: 1px solid #333; border-radius: 4px; background: #111; color: #fff; font-family: inherit; text-align: center; }
    #login-screen input:focus { outline: none; border-color: var(--geel); }
    #login-screen input::placeholder { color: #555; }
    #login-screen button { margin-top: 10px; padding: 10px 32px; font-size: 13px; font-weight: 500; background: var(--geel); color: #000; border: none; border-radius: 4px; cursor: pointer; font-family: inherit; }
    #login-error { color: var(--rood); font-size: 12px; margin-top: 8px; min-height: 18px; }
    #login-screen .login-setup-msg { color: #ffffff88; font-size: 11px; margin-bottom: 12px; max-width: 260px; text-align: center; line-height: 1.5; }
    #login-screen .login-success { color: var(--groen); font-size: 12px; margin-top: 8px; min-height: 18px; }

    /* Layout */
    html, body { height: 100%; }
    #app { display: none; flex-direction: column; height: 100vh; }
    #board-container { display: flex; flex-direction: column; flex: 1 1 0; overflow: hidden; }
    .main { display: flex; flex: 1 1 0; overflow: hidden; }
    .header { background: var(--header); color: var(--headerTxt); padding: 14px 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
    .header-left { display: flex; align-items: center; gap: 18px; }
    .header-logo-ard { font-size: 26px; font-weight: 700; letter-spacing: 3px; }
    .header-logo-sub { font-size: 8px; font-weight: 300; letter-spacing: 2px; color: var(--headerSub); margin-top: 2px; }
    .header-div { width: 1px; height: 32px; background: var(--headerDiv); }
    .header-title-label { font-size: 9px; font-weight: 300; letter-spacing: 2px; color: var(--headerSub); text-transform: uppercase; }
    .header-title-name { font-size: 20px; font-weight: 300; margin-top: 2px; }
    .header-right { display: flex; gap: 6px; align-items: center; }
    .header-stat { text-align: center; }
    .header-stat-val { font-size: 20px; font-weight: 500; }
    .header-stat-lbl { font-size: 8px; color: var(--headerSub); letter-spacing: 1px; text-transform: uppercase; font-weight: 300; }

    .sel-bar { background: var(--selBg); border-bottom: 1px solid var(--zachtgrijs); padding: 10px 24px; min-height: 44px; display: flex; align-items: center; justify-content: space-between; }
    .sel-bar-name { font-size: 14px; }
    .sel-bar-slash { color: var(--geel); font-weight: 500; }

    .left-panels { width: 600px; flex-shrink: 0; display: flex; }
    .panel { width: 50%; background: var(--panelBg); overflow-y: auto; padding: 14px 10px; min-height: 0; }
    .panel:first-child { border-right: 1px solid var(--zachtgrijs); }
    .panel-title { font-size: 13px; letter-spacing: 1px; text-transform: uppercase; font-weight: 500; }
    .panel-sub { font-size: 10px; color: var(--txtSecondary); margin-top: 2px; margin-bottom: 12px; font-weight: 300; }
    .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }

    .resize-handle { width: 5px; flex-shrink: 0; background: var(--zachtgrijs); cursor: col-resize; position: relative; z-index: 10; transition: background 0.15s; }
    .resize-handle:hover, .resize-handle.active { background: var(--geel); }

    .pipeline { flex: 1; overflow-x: auto; display: flex; }
    .pipe-col { flex: 1; min-width: 200px; display: flex; flex-direction: column; border-right: 1px solid var(--zachtgrijs); }
    .pipe-col:last-child { border-right: none; }
    .pipe-col-header { padding: 14px 14px 10px; background: var(--panelBg); min-height: 88px; display: flex; flex-direction: column; justify-content: space-between; flex-shrink: 0; }
    .pipe-col-body { flex: 1; overflow-y: auto; padding: 8px 8px 16px; min-height: 0; }

    /* Kaarten */
    .kans-card { padding: 8px 10px; margin-bottom: 4px; border-radius: 4px; border: 1px solid var(--kaartBorder); background: var(--kaart); cursor: grab; transition: all 0.15s ease-out; }
    .match-card { margin-bottom: 8px; border-radius: 4px; cursor: grab; transition: all 0.15s ease-out; border: 1px solid var(--zachtgrijs); }

    /* Categorie groepen */
    .cat-group { margin-bottom: 10px; background: var(--catGroupBg); border-radius: 4px; border: 1px solid var(--zachtgrijs); overflow: hidden; }
    .cat-header { display: flex; align-items: center; gap: 5px; padding: 9px 10px; background: var(--catHeaderBg); border-bottom: 1px solid var(--zachtgrijs); cursor: grab; }
    .cat-header .cat-label { font-size: 13px; font-weight: 600; flex: 1; color: var(--txtPrimary); }
    .cat-items { padding: 6px 6px; }
    .cat-items > :last-child { margin-bottom: 0; }

    /* Dev items */
    .dev-item { padding: 9px 10px; margin-bottom: 3px; border-radius: 4px; cursor: pointer; transition: all 0.15s ease-out; display: flex; justify-content: space-between; align-items: center; }

    /* Badge */
    .badge { display: inline-flex; align-items: center; justify-content: center; border-radius: 2px; background: var(--badgeBg); color: var(--badgeTxt); font-weight: 500; flex-shrink: 0; letter-spacing: 0.5px; }
    .badge-sm { width: 18px; height: 18px; font-size: 8px; }
    .badge-md { width: 22px; height: 22px; font-size: 10px; }
    .badge-lg { width: 24px; height: 24px; font-size: 10px; }

    /* Stage badge */
    .stage-badge { padding: 2px 8px; font-size: 9px; font-weight: 500; border-radius: 2px; text-transform: uppercase; letter-spacing: 0.5px; flex-shrink: 0; white-space: nowrap; line-height: 1.4; display: inline-block; }

    /* Knoppen */
    .btn { padding: 8px 16px; font-size: 12px; font-weight: 500; border: none; border-radius: 3px; cursor: pointer; font-family: inherit; }
    .btn-sm { padding: 3px 8px; font-size: 10px; }
    .btn-xs { padding: 2px 6px; font-size: 10px; }
    .btn-black { background: #000; color: #fff; }
    .btn-grey { background: var(--lichtgrijs); color: var(--grijs); }
    .btn-red { background: rgba(194,45,11,0.08); color: var(--rood); }
    .btn-match { color: var(--geel); background: rgba(217,163,0,0.09); border: 1px solid rgba(217,163,0,0.2); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500; }
    .btn-icon { background: none; border: none; cursor: pointer; font-size: 14px; color: var(--grijs); font-family: inherit; padding: 2px 4px; transition: color 0.15s; }
    .btn-icon:hover { color: var(--geel); }
    .header-btn { color: #fff; font-size: 12px; padding: 6px 12px; height: 34px; display: inline-flex; align-items: center; justify-content: center; gap: 4px; transition: opacity 0.15s; }
    .header-btn:hover { opacity: 0.75; background: #555 !important; }
    .header-btn-icon { width: 36px; padding: 0; }
    .header-icon { font-size: 18px; line-height: 1; }
    .btn-add-col { width: 100%; padding: 9px; background: transparent; border: 2px dashed var(--zachtgrijs); border-radius: 4px; cursor: pointer; color: var(--grijs); font-size: 11px; font-family: inherit; margin-top: 4px; }
    .btn-full { width: 100%; margin-top: 4px; }

    /* Coalitie */
    .coalition { padding: 5px 7px; margin-top: 3px; border-radius: 4px; background: rgba(217,163,0,0.03); border: 1.5px dashed rgba(217,163,0,0.33); font-size: 11px; cursor: pointer; }

    /* Drop zone */
    .drop-zone-active { padding: 10px; border: 2px dashed var(--geel); border-radius: 6px; text-align: center; color: var(--geel); font-size: 12px; font-weight: 500; margin-bottom: 10px; }
    #drag-indicator { position: fixed; height: 3px; background: var(--geel); border-radius: 0 2px 2px 0; pointer-events: none; z-index: 100; display: none; }
    #drag-indicator::before { content: ''; position: absolute; left: -3px; top: 50%; transform: translateY(-50%); width: 9px; height: 9px; background: var(--bg); border: 2px solid var(--geel); border-radius: 50%; box-sizing: border-box; }

    /* Modals */
    .modal-overlay { position: fixed; inset: 0; background: var(--modalOverlay); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .modal { background: var(--modalBg); border-radius: 8px; width: 100%; max-height: 85vh; overflow: auto; box-shadow: 0 12px 40px rgba(0,0,0,0.15); color: var(--txtPrimary); }
    .modal-head { padding: 14px 20px; border-bottom: 1px solid var(--zachtgrijs); display: flex; justify-content: space-between; align-items: center; }
    .modal-head h3 { font-size: 16px; font-weight: 500; }
    .modal-body { padding: 20px; }
    .field { margin-bottom: 14px; }
    .field label { font-size: 10px; font-weight: 500; color: var(--txtSecondary); display: block; margin-bottom: 6px; letter-spacing: 1px; text-transform: uppercase; }
    .field input, .field select, .field textarea { width: 100%; padding: 8px 10px; font-size: 13px; border: 1px solid var(--inputBorder); border-radius: 4px; font-family: inherit; color: var(--txtPrimary); background: var(--kaart); }
    .field textarea { min-height: 60px; resize: vertical; }
    .action-fields-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    /* Toast melding */
    .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #000; color: #fff; padding: 10px 24px; border-radius: 20px; font-size: 12px; font-weight: 500; z-index: 2000; opacity: 0; transition: opacity 0.3s; pointer-events: none; display: flex; align-items: center; gap: 12px; }
    .toast .undo-btn { background: var(--geel); color: #000; border: none; padding: 4px 10px; border-radius: 10px; font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit; white-space: nowrap; }
    .toast.show { opacity: 1; pointer-events: auto; }
    #map-container { z-index: 0; border-radius: 4px; }
    .map-legend { display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin-top:10px; font-size:11px; color:var(--grijs); font-weight:300; }
    .map-legend-dot { width:12px; height:12px; border-radius:50%; border:2px solid #fff; box-shadow:0 0 2px rgba(0,0,0,0.3); display:inline-block; vertical-align:middle; margin-right:3px; }
    .map-status { font-size:11px; color:var(--grijs); margin-top:8px; font-weight:300; }

    .header-fin-label { display: none; }
    .header-fin-full { display: inline; }

    /* Firebase verbindingsindicator */
    .conn-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; flex-shrink: 0; }

    /* Zoekbalk in panelen */
    .panel-search-wrap { position: relative; margin-bottom: 8px; }
    .panel-search { width: 100%; padding: 6px 26px 6px 8px; font-size: 11px; border: 1px solid var(--inputBorder); border-radius: 3px; font-family: inherit; color: var(--txtPrimary); background: var(--kaart); }
    .panel-search:focus { outline: none; border-color: var(--geel); }
    .panel-search-clear { position: absolute; right: 6px; top: 50%; transform: translateY(-50%); background: none; border: none; font-size: 14px; color: var(--grijs); cursor: pointer; padding: 0 2px; line-height: 1; display: none; }
    .panel-search:not(:placeholder-shown) + .panel-search-clear { display: block; }

    /* Lege kolom boodschap */
    .empty-col-msg { text-align: center; padding: 20px 10px; color: var(--grijs); font-size: 11px; font-weight: 300; font-style: italic; }

    /* Checkbox */
    .cb { width: 16px; height: 16px; border-radius: 2px; border: 2px solid var(--zachtgrijs); display: inline-flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; cursor: pointer; flex-shrink: 0; }
    .cb.checked { background: var(--geel); border-color: var(--geel); color: #000; }

    /* Footer — onderaan window */
    .footer { flex-shrink: 0; padding: 12px 24px; border-top: 1px solid var(--zachtgrijs); background: var(--footerBg); display: flex; justify-content: space-between; align-items: center; }
    .footer span { font-size: 12px; color: var(--grijs); font-weight: 300; }

    /* Mobiele elementen (verborgen op desktop) */
    .mob-tabs { display: none; }
    .mob-stage-tabs { display: none; }
    .mob-move-btns { display: none; }

    /* Print */
    @page { size: landscape; margin: 0; }
    @media print {
      html, body { height: auto !important; overflow: visible !important; }
      body { -webkit-print-color-adjust: exact; print-color-adjust: exact; margin: 0 !important; }
      [data-noprint] { display: none !important; }
      .mob-tabs { display: none !important; }
      #login-screen { display: none !important; }
      #app { display: flex !important; flex-direction: column !important; height: auto !important; }
      .main { flex: none !important; height: auto !important; overflow: visible !important; }
      .left-panels { overflow: visible !important; height: auto !important; width: 500px !important; flex-shrink: 0 !important; }
      .panel { overflow: visible !important; height: auto !important; }
      .pipeline { overflow: visible !important; flex: 1 !important; }
      .resize-handle { display: none !important; }
      .pipe-col { overflow: visible !important; height: auto !important; }
      .pipe-col-body { overflow: visible !important; padding-bottom: 8px !important; height: auto !important; }
      .header { padding: 8px 16px !important; }
      .sel-bar { padding: 4px 16px !important; min-height: 24px !important; }
      .footer { position: static !important; padding: 4px 16px !important; }
    }

    /* ─── MOBIEL (< 768px) ─── */
    @media (max-width: 767px) {

      /* Header compact */
      .header { padding: 10px 12px; gap: 6px; }
      .header-left { gap: 10px; }
      .header-logo-ard { font-size: 20px; letter-spacing: 2px; }
      .header-logo-sub { display: none; }
      .header-div { height: 24px; }
      .header-title-name { font-size: 16px; }
      .header-right { gap: 4px; flex-wrap: nowrap; justify-content: flex-end; }
      .header-fin-label { display: inline; }
      .header-fin-full { display: none; }
      [data-action="print"] { display: none; }
      .header-btn { padding: 6px 8px; font-size: 11px; height: 34px; }
      .header-btn-icon { width: 34px; }
      .header-btn .header-icon { font-size: 16px; }

      /* Selectiebalk compact */
      .sel-bar { padding: 6px 12px; }

      /* App: ruimte voor vaste tab-balk onderaan */
      #app { height: calc(100vh - 52px); height: calc(100dvh - 52px); }

      /* Main: stacked, overflow hidden zodat flex scroll-keten werkt */
      .main { flex-direction: column; overflow: hidden; }
      .left-panels { width: 100%; flex-direction: column; border-right: none; flex: 1; min-height: 0; }
      .panel { width: 100%; padding: 12px; flex: 1; min-height: 0; }
      .panel:first-child { border-right: none; border-bottom: none; }

      /* Mobiele tab-navigatie */
      .mob-tabs {
        display: flex; position: fixed; bottom: 0; left: 0; right: 0; z-index: 900;
        background: var(--panelBg); border-top: 1px solid var(--zachtgrijs);
        box-shadow: 0 -2px 8px rgba(0,0,0,0.08);
      }
      .mob-tab {
        flex: 1; padding: 8px 4px; text-align: center; font-size: 10px; font-weight: 500;
        font-family: inherit; border: none; cursor: pointer; background: transparent;
        color: var(--txtSecondary); letter-spacing: 0.5px; text-transform: uppercase;
        display: flex; flex-direction: column; align-items: center; gap: 2px;
        min-height: 52px; justify-content: center;
      }
      .mob-tab.active { color: var(--geel); }
      .mob-tab-icon { font-size: 18px; }

      /* Verberg secties op basis van actieve tab */
      .main .left-panels { display: none; }
      .main .pipeline { display: none; }
      body.mob-view-devs .main .left-panels { display: flex; flex-direction: column; }
      body.mob-view-devs .main .left-panels .panel:last-child { display: none; }
      body.mob-view-kansen .main .left-panels { display: flex; flex-direction: column; }
      body.mob-view-kansen .main .left-panels .panel:first-child { display: none; }
      body.mob-view-pipeline .main .pipeline { display: flex; flex-direction: column; }

      /* Pipeline kolommen: stacked met tabs */
      .pipeline { flex-direction: column; overflow: hidden; }
      .pipe-col { min-width: unset; border-right: none; border-bottom: none; flex: 1; min-height: 0; }
      .pipe-col-body { padding: 8px 8px 16px; }

      /* Pipeline stage tabs (mobiel) */
      .mob-stage-tabs {
        display: flex; overflow-x: auto; gap: 0; border-bottom: 1px solid var(--zachtgrijs);
        background: var(--panelBg); flex-shrink: 0;
        -webkit-overflow-scrolling: touch;
      }
      .mob-stage-tab {
        flex: 1; min-width: 0; padding: 10px 6px; text-align: center; font-size: 11px;
        font-weight: 500; font-family: inherit; border: none; cursor: pointer;
        background: transparent; color: var(--txtSecondary); white-space: nowrap;
        border-bottom: 3px solid transparent;
      }
      .mob-stage-tab.active { color: var(--txtPrimary); }

      /* Verberg niet-actieve pipeline kolommen */
      body.mob-view-pipeline .pipe-col { display: none; }
      body.mob-view-pipeline .pipe-col.mob-active { display: flex; }

      /* Kaarten: grotere tap targets */
      .kans-card { padding: 12px; margin-bottom: 6px; cursor: default; }
      .match-card { cursor: default; }
      .dev-item { padding: 10px 12px; margin-left: 0; margin-bottom: 4px; min-height: 44px; }
      .dev-type-header { min-height: 36px; }
      .btn { min-height: 36px; padding: 10px 16px; font-size: 13px; }
      .btn-sm { padding: 6px 10px; font-size: 11px; min-height: 32px; }
      .btn-xs { padding: 5px 8px; font-size: 11px; min-height: 28px; }
      .btn-icon { padding: 6px 8px; font-size: 16px; min-height: 36px; min-width: 36px; display: inline-flex; align-items: center; justify-content: center; }
      .btn-add-col { padding: 14px; font-size: 13px; }
      .cb { width: 22px; height: 22px; font-size: 12px; }
      .coalition { padding: 10px; }

      /* Touch move knoppen (vervangt drag & drop) */
      .mob-move-btns { display: flex; gap: 3px; flex-wrap: wrap; margin-top: 6px; }
      .mob-move-btn {
        padding: 5px 8px; font-size: 10px; font-weight: 500; font-family: inherit;
        border: 1px solid var(--zachtgrijs); border-radius: 3px; cursor: pointer;
        background: var(--lichtgrijs); color: var(--txtSecondary);
        text-transform: uppercase; letter-spacing: 0.3px;
      }

      /* Verberg drag-gerelateerde elementen op mobiel */
      [draggable="true"] { -webkit-user-drag: none; -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }
      .drop-zone-active { display: none; }
      .resize-handle { display: none; }

      /* iOS Safari: cursor:pointer nodig voor click-delegatie op niet-native elementen */
      [data-action] { cursor: pointer; -webkit-tap-highlight-color: transparent; }

      /* Footer: verberg op mobiel (tab-balk vervangt) */
      .footer { display: none; }

      /* Modal: full width op mobiel */
      .modal-overlay { padding: 10px; align-items: flex-end; }
      .modal { max-height: 90vh; border-radius: 12px 12px 0 0; }
      .modal-body { padding: 16px; }
      .field input, .field select, .field textarea { padding: 10px 12px; font-size: 15px; }
      .action-fields-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body onclick="void(0)">
  <!-- Login -->
  <div id="login-screen">
    <div class="logo">
      <div class="logo-ard">ARD</div>
      <div class="logo-sub">ATELIERRUIMDENKERS</div>
    </div>
    <!-- Login-modus -->
    <div id="login-mode" style="display:none;flex-direction:column;align-items:center">
      <input type="password" id="login-pw" placeholder="Wachtwoord" onfocus="this.placeholder=''" onblur="if(!this.value)this.placeholder='Wachtwoord'" autofocus>
      <button onclick="KB.handleLogin()">Inloggen</button>
      <div id="login-error"></div>
    </div>
    <!-- Setup-modus (eenmalig, als geen hash in Firebase) -->
    <div id="setup-mode" style="display:none;flex-direction:column;align-items:center">
      <div class="login-setup-msg">Geen wachtwoord ingesteld. Kies een wachtwoord om de app te beveiligen.</div>
      <input type="password" id="setup-pw1" placeholder="Nieuw wachtwoord" style="margin-bottom:6px">

function fmtEuro(n) {

function getActionStatus(match) {
  if (!actionEnabled()) return 'disabled';

  const now = new Date(); now.setHours(0,0,0,0);
  const next = new Date(match.nextAction); next.setHours(0,0,0,0);
  const diffDays = Math.round((next - now) / 86400000);
  if (diffDays >= 0) return 'ok';
  const threshold = match.actionThreshold || actionDefaults()[match.stage];
  if (Math.abs(diffDays) <= threshold) return 'expired';
  return 'critical';
}

const _geocodeMemCache = {};
async function geocodeAddress(adres) {
  if (!adres) return null;
  if (_geocodeMemCache[adres]) return _geocodeMemCache[adres];
  async function tryGeocode(q) {
    const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&countrycodes=nl&limit=1`;
    const res = await fetch(url, {headers:{'User-Agent':'DeKoppelbaas/1.0'}});
    const data = await res.json();
    if (data && data[0]) return {lat:parseFloat(data[0].lat), lng:parseFloat(data[0].lon)};
    return null;
  }
  try {
    let r = await tryGeocode(adres);
    // Fallback: verwijder huisnummer en probeer alleen straat + stad
    if (!r) {
      const stripped = adres.replace(/\s*\d+[a-zA-Z]?\s*,/, ',');
      if (stripped !== adres) {
        await delay(1100);
        r = await tryGeocode(stripped);
      }
    }
    if (r) { _geocodeMemCache[adres] = r; return r; }
  } catch(e) { console.warn('Geocode fout:', e); }
  return null;
}
function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

function objToArr(obj) {
  if (!obj) return [];
  return Object.keys(obj).map(id => ({...obj[id], id}));
}
function sortedArr(obj) { return objToArr(obj).sort((a,b) => (a.so||0) - (b.so||0)); }

function asArr(v) { return Array.isArray(v) ? v : []; }
function coalIds(m) {
  const s = new Set();
  asArr(m.coals).forEach(c => asArr(c).forEach(id => s.add(id)));
  return s;
}
function indivLinks(m) {
  const ci = coalIds(m);
  return asArr(m.links).filter(id => !ci.has(id));
}
function totalLinks(m) { return indivLinks(m).length + asArr(m.coals).length; }
function matchDevIds(m) {
  const s = new Set(asArr(m.links));
  asArr(m.coals).forEach(c => asArr(c).forEach(id => s.add(id)));
  return s;
}
function getAlertLevel(m) {
  const stage = STAGES.find(s => s.id === m.stage);
  const tl = totalLinks(m);
  const minNeeded = stage && stage.needsMin2 ? 2 : 1;
  if (tl >= minNeeded) return 'ok';
  return tl === 0 ? 'rood' : 'oranje';
}
function getAlarms() {
  const alarms = [];
  const kansen = STATE.data.kansen;
  let noAction = 0;
  objToArr(STATE.data.matches).forEach(m => {
    const al = getAlertLevel(m);
    if (al !== 'ok') {
      const k = kansen[m.kid];
      const tl = totalLinks(m);
      const stage = STAGES.find(s => s.id === m.stage);
      const min = stage && stage.needsMin2 ? 2 : 1;
      alarms.push({m, k, level: al, type: 'match',
        msg: `"${k?.name||'?'}" \u2014 ${tl===0?'geen match':`${tl} match`} (minstens ${min} nodig)`});
    }
    if (m.stage !== 'actief') {
      const as = getActionStatus(m);
      if (as === 'expired' || as === 'critical') {
        const k = kansen[m.kid];
        const _n=new Date();_n.setHours(0,0,0,0);const _nx=new Date(m.nextAction);_nx.setHours(0,0,0,0);
        const _df=Math.abs(Math.round((_nx-_n)/86400000));
        alarms.push({m, k, level: as==='critical'?'rood':'oranje', type: 'action',
          msg: `"${k?.name||'?'}" \u2014 actie ${_df} dag${_df!==1?'en':''} verlopen`});
      } else if (as === 'none') { noAction++; }
    }
  });
  if (noAction > 0) alarms.push({m:null, k:null, level:'grijs', type: 'action',
    msg: `${noAction} match${noAction!==1?'es':''} zonder geplande actie`});
  return alarms;
}
function unmatchedKansen() {
  const ms = STATE.data.matches;

}

}

  const enc = new TextEncoder().encode(pw);
  const buf = await crypto.subtle.digest('SHA-256', enc);

}

KB.checkInitialState = async function() {
  // Harde fallback: als na 4 seconden niets getoond is, forceer setup-scherm
  let resolved = false;
  const fallbackTimer = setTimeout(() => {
    if (!resolved) {
      resolved = true;
      showPanel('setup-mode');
      document.getElementById('setup-error').textContent = 'Firebase reageert niet. Controleer je verbinding.';
    }
  }, 4000);

  try {
    if (!db) initFirebase();
    if (!db) {
      clearTimeout(fallbackTimer); resolved = true;
      showPanel('setup-mode');
      document.getElementById('setup-error').textContent = 'Kan Firebase niet initialiseren.';
      return;
    }
    const snap = await db.ref('meta/passwordHash').once('value');
    clearTimeout(fallbackTimer);
    if (resolved) return; // fallback heeft al overgenomen
    resolved = true;
    const val = snap.val();
    if (!val) {
      showPanel('setup-mode');
    } else {
      showPanel('login-mode');
      document.getElementById('login-pw').focus();
    }
  } catch(e) {
    clearTimeout(fallbackTimer);
    if (resolved) return;
    resolved = true;
    showPanel('login-mode');
    document.getElementById('login-error').textContent = 'Fout: ' + e.message;
  }
};

  if (undoFn) {

  }
}

KB.handleSetup = async function() {
  const pw1 = document.getElementById('setup-pw1').value.trim();
  const pw2 = document.getElementById('setup-pw2').value.trim();
  const errEl = document.getElementById('setup-error');
  errEl.textContent = '';
  if (!pw1) { errEl.textContent = 'Voer een wachtwoord in.'; return; }
  if (pw1.length < 4) { errEl.textContent = 'Minimaal 4 tekens.'; return; }
  if (pw1 !== pw2) { errEl.textContent = 'Wachtwoorden komen niet overeen.'; return; }
  errEl.style.color = '#d9a300';
  errEl.textContent = 'Bezig...';
  try {
    if (!db) initFirebase();
    const hashed = await hashPassword(pw1);
    await db.ref('meta/passwordHash').set(hashed);
    showPanel('setup-done');
  } catch(e) {
    errEl.style.color = '';
    errEl.textContent = 'Fout: ' + e.message;
  }
};

KB.handleLogin = async function() {
  const pw = document.getElementById('login-pw').value;
  if (!pw) { document.getElementById('login-error').textContent = 'Voer een wachtwoord in.'; return; }
  document.getElementById('login-error').textContent = '';
  try {
    if (!db) initFirebase();
    const snap = await db.ref('meta/passwordHash').once('value');
    const stored = snap.val();
    if (!stored) {
      showPanel('setup-mode');
      return;
    }
    const hashed = await hashPassword(pw);
    if (hashed === stored) {
      enterApp();
    } else {
      document.getElementById('login-error').textContent = 'Onjuist wachtwoord.';
    }
  } catch(e) {
    document.getElementById('login-error').textContent = 'Verbindingsfout: ' + e.message;
  }
};

function applyTheme() {
  const c = C();
  const r = document.documentElement.style;
  Object.keys(c).forEach(k => r.setProperty('--' + k, c[k]));
  document.body.style.background = c.bg;
  document.body.style.color = c.txtPrimary;
}

// ─── RENDERING (placeholder) ─────────────────────
function render() {
  const c = C();
  const devs = sortedArr(STATE.data.devs);
  const dts = sortedArr(STATE.data.devTypes);
  const kcs = sortedArr(STATE.data.kansCats);
  const kansen = sortedArr(STATE.data.kansen);
  const matches = objToArr(STATE.data.matches);
  const unmatched = unmatchedKansen();
  const alarms = getAlarms();
  const selName = getSelectionName();

  let html = '';
  html += renderHeader(c, devs, unmatched, matches, alarms);
  html += renderSelectionBar(c, selName, matches, unmatched);
  html += '<div class="main">';
  html += '<div class="left-panels" id="left-panels">';
  html += renderDevsPanel(c, devs, dts, matches);
  html += renderKansenPanel(c, unmatched, kcs, matches);
  html += '</div>';
  html += '<div class="resize-handle" id="resize-handle"></div>';
  html += renderPipeline(c, matches, kansen, devs, dts);
  html += '</div>';
  html += renderFooter(c);

  // Bewaar zoekbalk focus
  const ae = document.activeElement;
  document.getElementById('board-container').innerHTML = html;

  // Herstel paneel-breedte na render
  if (STATE.ui.leftPanelWidth) {
    const lp = document.getElementById('left-panels');
    if (lp) lp.style.width = STATE.ui.leftPanelWidth + 'px';
  }

  // Skip modal re-render als gebruiker bezig is met invoer in de modal
  const _aeInModal = document.activeElement?.closest('.modal-body');
  if (!_aeInModal) renderModal();
  updateMobView();

  // Herstel zoekbalk focus
  if (STATE.ui.searchDevs || STATE.ui.searchKansen) {
    const searches = document.querySelectorAll('.panel-search');
    searches.forEach(s => {
      if (STATE.ui.searchDevs && s.value === STATE.ui.searchDevs) { s.focus(); s.setSelectionRange(s.value.length, s.value.length); }
      if (STATE.ui.searchKansen && s.value === STATE.ui.searchKansen) { s.focus(); s.setSelectionRange(s.value.length, s.value.length); }
    });
  }
}

// Mobiele view helper: body-klasse en tab-balk sync
function updateMobView() {
  if (!isMob()) {
    document.body.classList.remove('mob-view-devs','mob-view-kansen','mob-view-pipeline');
    return;
  }
  const tab = STATE.ui.mobTab;
  document.body.classList.remove('mob-view-devs','mob-view-kansen','mob-view-pipeline');
  document.body.classList.add('mob-view-' + tab);
  // Tab-balk active state
  document.querySelectorAll('.mob-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === tab);
  });
  // Pipeline stage tabs: actieve kolom
  if (tab === 'pipeline') {
    document.querySelectorAll('.pipe-col').forEach(col => {
      col.classList.toggle('mob-active', col.dataset.stage === STATE.ui.mobStage);
    });
    document.querySelectorAll('.mob-stage-tab').forEach(t => {
      const isAct = t.dataset.stage === STATE.ui.mobStage;
      t.classList.toggle('active', isAct);
      t.style.borderBottom = isAct ? `3px solid ${stageColor(t.dataset.stage)}` : '3px solid transparent';
    });
  }
  // Tellers in tab-balk
  const devCnt = objToArr(STATE.data.devs).length;
  const kansCnt = unmatchedKansen().length;
  const matchCnt = objToArr(STATE.data.matches).length;
  document.querySelectorAll('.mob-tab-label').forEach(l => {
    if (l.dataset.tabLabel === 'devs') l.textContent = `Devs (${devCnt})`;
    if (l.dataset.tabLabel === 'kansen') l.textContent = `Kansen (${kansCnt})`;
    if (l.dataset.tabLabel === 'pipeline') l.textContent = `Pipeline (${matchCnt})`;
  });
}

// Mobiele functies (direct onclick, geen delegatie — iOS Safari compatibel)
KB.mobSwitch = function(tab) {
  STATE.ui.mobTab = tab;
  updateMobView();
};
KB.mobStageSwitch = function(stage) {
  STATE.ui.mobStage = stage;
  updateMobView();
};
KB.mobMove = function(matchId, toStage) {
  const m = STATE.data.matches[matchId]; if (!m) return;
  if (lockEnabled() && m.locked) { showToast('Kaart is vergrendeld'); return; }
  const oldIdx = STAGE_ORDER[m.stage] || 0;
  const newIdx = STAGE_ORDER[toStage] || 0;
  if (newIdx > oldIdx && STAGE_GATES[toStage]) {
    STATE.ui.modal = 'stageGate';
    STATE.ui.modalData = {checked: false};
    STATE.ui.modalExtra = {...STAGE_GATES[toStage], dragMatchId: matchId, pendingStage: toStage};
    renderModal();
  } else {
    const cnt = objToArr(STATE.data.matches).filter(x => x.stage === toStage).length;
    const hist = [...(m.stageHistory||[]).slice(-49), {stage:toStage, at:today()}];
    fbUpdate(`matches/${matchId}`, {stage:toStage, so:cnt, stageHistory:hist, updatedAt:today()});
  }
};
KB.mobUnmatch = function(matchId) {
  STATE.ui.modal = 'confirmDelete';
  STATE.ui.modalExtra = {type:'match', id:matchId};
  renderModal();
};

          else html += `<span style="color:${c.txtSecondary}">${ico('mapPin',11)} ${esc(kans.adres)}</span>`;
          html += '</div>';
        }
      }
      html += '</div>';
    });

    if (ck.length === 0) html += `<div data-empty style="padding:6px 10px;font-size:10px;color:${c.grijs};font-style:italic;pointer-events:none">Geen kansen</div>`;
    html += '</div></div>'; // cat-items + cat-group
  });

  // Geen categorie
  const uncatK = unmatched.filter(k => !kcs.find(cat => cat.id === k.cid));
  if (uncatK.length > 0) {
    html += `<div class="cat-group" data-kanscat-group=""><div class="cat-header" style="cursor:default"><span class="cat-label" style="font-style:italic;font-weight:400;color:${c.grijs}">Geen categorie</span></div><div class="cat-items">`;
    uncatK.forEach(kans => {
      const isKC = STATE.ui.collapsedKansen[kans.id];
      const mp = mapsUrl(kans.adres);
      html += `<div class="kans-card" draggable="true" data-drag-type="kans" data-drag-id="${kans.id}" style="padding:${isKC?'6px 10px':'8px 10px'}">`;
      html += `<div style="display:flex;align-items:flex-start;gap:5px;cursor:pointer" data-action="toggleKansCollapse" data-id="${kans.id}">`;
      html += `<span style="font-size:13px;color:${c.grijs};flex-shrink:0;line-height:1.3">${isKC?'\u25B8':'\u25BE'}</span>`;
      html += `<div style="flex:1;min-width:0"><div style="font-weight:500;font-size:12px;line-height:1.3;color:${c.txtPrimary}">${esc(kans.name||'Naamloos')}</div></div>`;
      html += `<div style="display:flex;gap:3px;align-items:center;flex-shrink:0" data-noprint>`;
      html += `<button class="btn btn-match btn-xs" data-action="matchKans" data-id="${kans.id}" title="Koppel aan ontwikkelaar">Match \u2192</button>`;
      html += `<button class="btn-xs" style="background:${c.lichtgrijs};border:none;border-radius:3px;cursor:pointer;color:${c.grijs};font-family:inherit" data-action="editKans" data-id="${kans.id}" title="Kans bewerken">${ico('pencil',12)}</button>`;
      html += '</div></div>';
      if (!isKC) {
        html += `<div style="font-size:10px;color:${c.txtSecondary};font-weight:300;margin-top:2px">${kans.omvang ? 'BVO '+esc(kans.omvang)+'m\u00B2 \u00B7 ' : ''}${esc(kans.type||'')}</div>`;
        if (kans.adres && mp) {
          html += `<div style="font-size:10px;margin-top:1px;font-weight:300"><a href="${mp}" target="_blank" rel="noopener noreferrer" style="color:${c.blauw};text-decoration:none">${ico('mapPin',10)} ${esc(kans.adres)}</a></div>`;
        }
      }
      html += '</div>';
    });
    html += '</div></div>'; // cat-items + cat-group
  }

  html += '<button data-noprint title="Nieuwe kans-categorie toevoegen" class="btn btn-grey btn-sm btn-full" data-action="addKansCat">+ Categorie</button>';
  html += '</div>';
  return html;
}

function renderPipeline(c, matches, kansen, devs, dts) {
  const {selectedDev, selectedMatch, dragOver} = STATE.ui;
  const mob = isMob();
  let html = '<div class="pipeline">';

  // Mobiele stage-tabs
  if (mob) {
    html += '<div class="mob-stage-tabs">';
    STAGES.forEach(s => {
      const sc2 = stageColor(s.id);
      const cnt = matches.filter(m => m.stage === s.id).length;
      const isAct = STATE.ui.mobStage===s.id;
      html += `<button class="mob-stage-tab ${isAct?'active':''}" data-stage="${s.id}" onclick="KB.mobStageSwitch('${s.id}')" style="color:${sc2};border-bottom:3px solid ${isAct?sc2:'transparent'}">${esc(s.short)} (${cnt})</button>`;
    });
    html += '</div>';
  }

  STAGES.forEach(stage => {
    const sc = stageColor(stage.id);
    const sm = matches.filter(m => m.stage === stage.id).sort((a,b) => (a.so||0) - (b.so||0));
    const isDT = dragOver === stage.id;
    const allC = sm.length > 0 && sm.every(m => m.col);

    html += `<div class="pipe-col" data-stage="${stage.id}" style="background:${isDT ? sc+'12' : sc+'06'}">`;

    // Kolomheader
    html += `<div class="pipe-col-header" style="border-bottom:3px solid ${sc}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:6px">
            <span style="font-size:15px;font-weight:600;color:${sc};line-height:1.2">${esc(stage.label)}</span>
            ${sm.length > 0 ? `<button data-noprint class="btn-icon" style="font-size:14px;line-height:1;flex-shrink:0" data-action="collapseCol" data-id="${stage.id}">${allC?'\u25B8':'\u25BE'}</button>` : ''}
          </div>
          <div style="font-size:10px;color:${c.grijs};margin-top:3px;font-weight:300">${esc(stage.sub)}</div>
        </div>
        <div style="font-size:24px;font-weight:300;color:${sc};flex-shrink:0">${sm.length}</div>
      </div>
      ${(() => {
        const minTxt = stage.needsMin2 ? 'Min. 2 koppelingen' : 'Min. 1 koppeling';
        const rawH = financialEnabled() ? sm.reduce((s,m) => s + (m.honorarium||0), 0) : 0;
        const pct = stagePct(stage.id);
        const gw = Math.round(rawH * pct / 100);
        return `<div style="font-size:10px;color:${c.grijs};font-weight:300;font-style:italic">${minTxt}</div>
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-top:4px;min-height:22px">
          ${rawH ? `<div style="font-size:11px;color:${c.grijs};font-weight:300">${fmtEuro(rawH)} honorarium</div>
          <div style="display:flex;align-items:baseline;gap:4px">
            <span style="font-size:10px;color:${c.grijs};font-weight:300">${pct}% \u2192</span>
            <span style="font-size:16px;font-weight:600;color:${sc}">${fmtEuro(gw)}</span>
          </div>` : '&nbsp;'}
        </div>`;
      })()}
    </div>`;

    // Kaarten
    html += '<div class="pipe-col-body">';
    sm.forEach(match => {
      html += renderMatchCard(c, match, stage, devs, dts);
    });

    if (sm.length === 0) {
      const emptyLabels = {matches:'potentiële matches',verkennend:'verkennende gesprekken',offerte:'offertetrajecten',actief:'lopend werk'};
      html += `<div class="empty-col-msg">Nog geen ${emptyLabels[stage.id]||'items'}.<br>Sleep een kans hierheen${stage.addLabel ? ' of klik +' : ''}.</div>`;
    }
    // Toevoeg-knop
    if (stage.addLabel) {
      html += `<button data-noprint title="Nieuwe match toevoegen in ${esc(stage.label)}" class="btn-add-col" data-action="addMatch" data-stage="${stage.id}">${esc(stage.addLabel)}</button>`;
    }
    html += '</div></div>';
  });

  html += '</div>';
  return html;
}

function renderMatchCard(c, match, stage, devs, dts) {
  const kans = STATE.data.kansen[match.kid];
  if (!kans) return `<div class="match-card" style="padding:14px;background:${c.rood}18;border-left:5px solid ${c.rood};opacity:0.7">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <span style="font-size:12px;color:${c.rood};font-weight:400">Kans verwijderd</span>
      <button class="btn btn-red btn-xs" data-action="deleteMatch" data-id="${match.id}">Verwijder</button>
    </div></div>`;
  const sc = stageColor(stage.id);
  const sb = stageBg(stage.id);
  const tl = totalLinks(match);
  const il = indivLinks(match);
  const iDevs = devs.filter(d => il.includes(d.id));
  const al = getAlertLevel(match);
  const isC = match.col;
  const isSel = STATE.ui.selectedMatch === match.id;
  const mp = mapsUrl(kans.adres);

  // Highlight logica
  let op = '1';
  if (STATE.ui.selectedDev) {
    const linked = matchDevIds(match).has(STATE.ui.selectedDev);
    if (!linked) op = '0.15';
  }

  const bc = al==='rood' ? c.rood : al==='oranje' ? c.oranje : c.zachtgrijs;
  const bgc = al==='rood' ? c.rood+'18' : al==='oranje' ? c.oranje+'18' : c.kaart;
  const shadow = isSel ? `0 0 0 2px ${sc},0 2px 12px rgba(0,0,0,0.06)` : '0 1px 2px rgba(0,0,0,0.02)';

  let html = `<div class="match-card" draggable="true" data-drag-type="match" data-drag-id="${match.id}" data-action="selectMatch" data-id="${match.id}"
    style="padding:14px;background:${bgc};border-left:5px solid ${bc};opacity:${op};box-shadow:${shadow}">`;

  // Titel-rij (altijd zichtbaar)
  html += `<div style="display:flex;align-items:center;gap:6px;cursor:pointer">`;
  html += `<span style="font-size:14px;color:${c.grijs};flex-shrink:0;padding:2px 4px" data-action="toggleMatchCollapse" data-id="${match.id}">${isC?'\u25B8':'\u25BE'}</span>`;
  html += `<span style="font-weight:500;font-size:14px;line-height:1.3;flex:1;min-width:0">${esc(kans.name)}</span>`;
  if (isC && tl > 0) html += `<span style="font-size:10px;color:${c.grijs};flex-shrink:0">(${tl})</span>`;
  if (lockEnabled() && match.locked) html += `<span style="flex-shrink:0;opacity:0.5;color:${c.grijs}" title="Vergrendeld">${ico('lock',16)}</span>`;
  if (financialEnabled()) {
    html += `<span style="flex-shrink:0;position:relative;opacity:${match.honorarium?'0.8':'0.35'};color:${match.honorarium?sc:c.grijs};display:inline-flex;align-items:center" title="${match.honorarium?fmtEuro(match.honorarium):'Geen honorarium ingevuld'}">${ico('banknote',18)}${!match.honorarium?`<span style="position:absolute;left:0;right:0;top:50%;height:2px;background:${c.rood};transform:rotate(-45deg)"></span>`:''}</span>`;
  }
  { const _as = getActionStatus(match);
    if (_as !== 'disabled' && match.stage !== 'actief') {
      const _acCol = {none:c.grijs,ok:c.groen,expired:'#e67e22',critical:c.rood}[_as]||c.grijs;
      let _acTt = 'Geen volgende actie gepland';
      if (match.nextAction) { const _n2=new Date();_n2.setHours(0,0,0,0);const _nx=new Date(match.nextAction);_nx.setHours(0,0,0,0);const _df=Math.round((_nx-_n2)/86400000);
        _acTt=_df>=0?'Volgende actie: '+_nx.toLocaleDateString('nl-NL'):'Actie verlopen: '+Math.abs(_df)+' dag'+(Math.abs(_df)!==1?'en':'')+' geleden'; }
      html += `<span style="flex-shrink:0;width:12px;height:12px;border-radius:50%;background:${_acCol};opacity:${_as==='none'?'0.3':'0.85'}" title="${esc(_acTt)}"></span>`;
    }
  }
  html += `<span class="stage-badge" style="flex-shrink:0;color:${sc};background:${sb};border:1px solid ${sc}33">${esc(stage.short)}</span>`;
  html += '</div>';

  // Uitgeklapte inhoud
  if (!isC) {
    const _bvoType = [kans.omvang ? `BVO ${esc(kans.omvang)}m\u00B2` : '', esc(kans.type||'')].filter(Boolean).join(' \u2014 ');
    if (_bvoType) html += `<div style="font-size:11px;color:${c.grijs};margin-top:3px;font-weight:300">${_bvoType}</div>`;
    if (kans.adres) {
      html += '<div style="font-size:11px;margin-top:2px;font-weight:300">';
      if (mp) html += `<a href="${mp}" target="_blank" rel="noopener noreferrer" style="color:${c.blauw};text-decoration:none">${ico('mapPin',12)} ${esc(kans.adres)}</a>`;
      else html += `<span style="color:${c.grijs}">${ico('mapPin',12)} ${esc(kans.adres)}</span>`;
      html += '</div>';
    }
    if (kans.contact) html += `<div style="font-size:11px;color:${c.grijs};margin-top:1px;font-weight:300">${ico('user',12)} ${esc(kans.contact)}</div>`;
    if (financialEnabled() && match.honorarium) { const gw = Math.round((match.honorarium||0) * stagePct(stage.id) / 100); html += `<div style="font-size:11px;color:${sc};margin-top:2px;font-weight:400">${ico('banknote',12)} ${fmtEuro(match.honorarium)} \u2192 ${fmtEuro(gw)}</div>`; }
    if (match.notitie) {
      const nt = match.notitie.length > 50 ? match.notitie.substring(0,50)+'\u2026' : match.notitie;
      html += `<div style="font-size:11px;color:${c.grijs};margin-top:2px;font-style:italic;font-weight:300">${esc(nt)}</div>`;
    }

    // Koppelingen-sectie
    html += `<div style="border-top:1px solid ${c.zachtgrijs};padding-top:8px;margin-top:6px">`;
    // Status-tekst
    const minReq = stage.needsMin2 ? 2 : 1;
    let statusTxt, statusCol;
    if (stage.needsMin2) {
      if (tl===0) { statusTxt = '\u26A0 Geen match'; statusCol = c.rood; }
      else if (tl===1) { statusTxt = '\u26A0 1 match'; statusCol = c.oranje; }
      else { statusTxt = '\u2713 '+tl+' matches'; statusCol = c.txtPrimary; }
    } else {
      statusTxt = tl + ' gekoppeld'; statusCol = c.txtPrimary;
    }
    html += `<div style="margin-bottom:5px"><span style="font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.5px;color:${statusCol}">${statusTxt}</span></div>`;

    // Individuele links
    if (iDevs.length > 0) {
      html += '<div style="display:flex;flex-direction:column;gap:3px;margin-bottom:3px">';
      iDevs.forEach(d => {
        const dt = dts.find(t => t.id === d.tid);
        html += `<div style="display:flex;align-items:center;gap:5px;font-size:11px">
          <span class="badge badge-sm">${esc(dt?.short||'?')}</span><span>${esc(d.name)}</span>
          <span data-noprint title="Ontkoppelen" style="cursor:pointer;opacity:0.3;font-size:10px" data-action="unlinkDev" data-mid="${match.id}" data-did="${d.id}">\u2715</span>
        </div>`;
      });
      html += '</div>';
    }

    // Coalities
    asArr(match.coals).forEach((coal, ci) => {
      const members = asArr(coal).map(id => devs.find(d => d.id === id)).filter(Boolean);
      html += `<div class="coalition" data-action="editCoalition" data-mid="${match.id}" data-cidx="${ci}">`;
      html += `<div style="font-weight:500;color:${c.geel};margin-bottom:4px;display:flex;justify-content:space-between">`;
      html += `<span>Coalitie <span style="font-size:8px;font-weight:300;color:${c.grijs}">(klik om te bewerken)</span></span>`;
      html += `<span data-noprint title="Coalitie verwijderen" style="cursor:pointer;color:${c.grijs};font-size:11px" data-action="deleteCoalition" data-mid="${match.id}" data-cidx="${ci}">\u2715</span>`;
      html += '</div><div style="display:flex;flex-direction:column;gap:3px">';
      members.forEach(m => {
        const dt = dts.find(t => t.id === m.tid);
        html += `<div style="display:flex;align-items:center;gap:4px"><span class="badge badge-sm">${esc(dt?.short||'?')}</span><span>${esc(m.name)}</span></div>`;
      });
      html += '</div></div>';
    });

    // Actieknoppen
    html += `<div style="border-top:1px solid ${c.zachtgrijs};margin-top:6px;padding-top:6px;display:flex;gap:5px;flex-wrap:wrap" data-noprint>`;
    html += `<button title="Coalitie toevoegen" style="font-size:11px;background:${c.lichtgrijs};border:none;border-radius:3px;padding:3px 8px;cursor:pointer;color:${c.txtPrimary};font-family:inherit;min-height:32px" data-action="addCoalition" data-mid="${match.id}">+ coalitie</button>`;
    html += `<button title="Match bewerken" style="font-size:11px;background:${c.lichtgrijs};border:none;border-radius:3px;padding:3px 8px;cursor:pointer;color:${c.txtPrimary};font-family:inherit;min-height:32px" data-action="editMatch" data-id="${match.id}">${ico('pencil',12)} bewerk</button>`;
    html += `<span style="flex:1"></span>`;
    if (lockEnabled()) html += `<button title="${match.locked?'Ontgrendel':'Vergrendel'}" style="background:none;border:none;cursor:pointer;color:${match.locked?c.geel:c.grijs};opacity:${match.locked?'0.7':'0.3'};width:28px;height:28px;display:inline-flex;align-items:center;justify-content:center" data-action="toggleLock" data-id="${match.id}">${match.locked?ico('lock',16):ico('lockOpen',16)}</button>`;
    html += '</div>';

    // Mobiele verplaats-knoppen (vervangt drag & drop)
    if (isMob()) {
      html += `<div class="mob-move-btns" data-noprint>`;
      if (!(lockEnabled() && match.locked)) {
        STAGES.forEach(s => {
          if (s.id !== stage.id) {
            const sc2 = stageColor(s.id);
            html += `<button class="mob-move-btn" style="border-color:${sc2};color:${sc2}" onclick="KB.mobMove('${match.id}','${s.id}')">\u2192 ${esc(s.short)}</button>`;
          }
        });
      }
      html += `<button class="mob-move-btn" style="border-color:${c.rood};color:${c.rood}" onclick="KB.mobUnmatch('${match.id}')">\u2715 Unmatch</button>`;
      html += '</div>';
    }

    html += '</div>'; // einde koppelingen-sectie
  }

  html += '</div>';
  return html;
}

function renderCoalitionModal(c) {
  const devs = sortedArr(STATE.data.devs);
  const dts = sortedArr(STATE.data.devTypes);
  const sel = STATE.ui.modalData?.selectedDevs || [];
  const ex = STATE.ui.modalExtra || {};
  // Bepaal welke devs al in ANDERE coalities zitten op deze match
  const m = STATE.data.matches[ex.mid];
  const busyIds = new Set();
  if (m) {
    asArr(m.coals).forEach((coal, ci) => {
      if (ex.editing && ci === ex.cidx) return; // huidige coalitie overslaan bij bewerken
      asArr(coal).forEach(id => busyIds.add(id));
    });
  }
  let html = `<div id="modal-scroll-list" style="max-height:250px;overflow-y:auto;border:1px solid ${c.zachtgrijs};border-radius:3px;padding:6px;margin-bottom:14px">`;
  devs.forEach(d => {
    const ch = sel.includes(d.id);
    const busy = busyIds.has(d.id);
    const dt = dts.find(t => t.id === d.tid);
    if (busy) {
      html += `<div style="display:flex;align-items:center;gap:7px;padding:6px;border-radius:3px;font-size:13px;opacity:0.35;cursor:default">
        <div class="cb" style="border-color:${c.zachtgrijs};background:transparent"></div>
        <span class="badge badge-sm" style="width:20px;height:20px;font-size:9px">${esc(dt?.short||'?')}</span>

        <span style="font-size:10px;color:${c.geel};margin-left:auto">coalitie</span>
      </div>`;
    } else {
      html += `<div style="display:flex;align-items:center;gap:7px;padding:6px;cursor:pointer;border-radius:3px;font-size:13px;background:${ch?c.geel+'15':'transparent'}" data-action="toggleCoalDev" data-id="${d.id}">
        <div class="cb ${ch?'checked':''}">${ch?'\u2713':''}</div>
        <span class="badge badge-sm" style="width:20px;height:20px;font-size:9px">${esc(dt?.short||'?')}</span>
        <span style="font-weight:${ch?'500':'300'}">${esc(d.name)}</span>
      </div>`;
    }
  });
  html += '</div>';
  const canSave = sel.length >= 2;
  const label = STATE.ui.modalExtra?.editing ? 'Opslaan' : 'Coalitie';
  html += `<div style="display:flex;justify-content:flex-end;gap:6px">

  return html;

function renderConfirmDeleteModal(c) {
  const ex = STATE.ui.modalExtra || {};
  let msg = '';
  switch(ex.type) {
    case 'dev': {
      const _dm = objToArr(STATE.data.matches).filter(m => matchDevIds(m).has(ex.id));
      msg = `"${esc(ex.name)}" verwijderen?${_dm.length ? ` Wordt ontkoppeld uit ${_dm.length} match(es).` : ''}`;
      break;
    }
    case 'kans': {
      const _km = objToArr(STATE.data.matches).filter(m => m.kid === ex.id);
      const _kh = _km.reduce((s,m) => s + (m.honorarium||0), 0);
      msg = `"${esc(ex.name)}" verwijderen?${_km.length ? ` ${_km.length} match(es) worden ook verwijderd.` : ''}${_kh ? ` Totaal ${fmtEuro(_kh)} honorarium gaat verloren.` : ''}`;
      break;
    }
    case 'match': {
      const _m = STATE.data.matches[ex.id];
      const _k = _m ? STATE.data.kansen[_m.kid] : null;
      const _tl = _m ? totalLinks(_m) : 0;
      const _honInfo = _m?.honorarium ? ` Honorarium ${fmtEuro(_m.honorarium)} gaat verloren.` : '';
      msg = ex.fromDrag
        ? `"${esc(ex.name)}" ontkoppelen? Alle ontwikkelaars en coalities worden losgekoppeld. De kans komt terug in het kansenpaneel.`
        : `Match "${esc(_k?.name||'?')}" verwijderen?${_tl ? ` ${_tl} koppeling(en) worden verwijderd.` : ''}${_honInfo} De kans komt terug in het kansenpaneel.`;
      break;
    }

KB.actEdit = function(matchId, field, value) {

KB.finEditType = function(matchId, value) {

  if (!md.finEdits) md.finEdits = {};
  if (!md.finEdits[matchId]) md.finEdits[matchId] = {};

  fbUpdate(`matches/${matchId}`, {calcType:value, updatedAt:today()});

};
KB.finEdit = function(matchId, field, value) {
  const md = STATE.ui.modalData; if (!md) return;
  if (!md.finEdits) md.finEdits = {};
  if (!md.finEdits[matchId]) md.finEdits[matchId] = {};
  const v = value ? Number(value) : 0;
  md.finEdits[matchId][field] = v;
  // Herbereken honorarium op basis van calcType
  const m = STATE.data.matches[matchId];
  if (m && ['bvo','bkm2','honPct','units','pricePerUnit'].includes(field)) {
    const ct = md.finEdits[matchId].calcType || m.calcType || 'bvo';
    const gv = (f, fb) => md.finEdits[matchId][f] !== undefined ? md.finEdits[matchId][f] : (m[f]||fb||0);
    let honorarium = 0;
    if (ct === 'bvo') honorarium = Math.round(gv('bvo') * gv('bkm2') * gv('honPct') / 100);
    else if (ct === 'units') honorarium = Math.round(gv('units') * gv('pricePerUnit'));
    md.finEdits[matchId].honorarium = honorarium;
  }
  // Direct opslaan naar Firebase
  const upd = {};
  upd[field] = v;
  if (md.finEdits[matchId].honorarium !== undefined) upd.honorarium = md.finEdits[matchId].honorarium;
  upd.updatedAt = today();
  fbUpdate(`matches/${matchId}`, upd);
  // Live visuele feedback: update honorarium + gewogen cellen in-place (geen re-render)
  if (['bvo','bkm2','honPct','units','pricePerUnit','honorarium'].includes(field)) {
    const hon = md.finEdits[matchId].honorarium ?? (field === 'honorarium' ? v : (m?.honorarium||0));
    const pct = stagePct(m?.stage);
    const gw = Math.round(hon * pct / 100);
    const honEl = document.querySelector(`[data-fin-hon="${matchId}"]`);
    const gwEl = document.querySelector(`[data-fin-gw="${matchId}"]`);
    if (honEl) honEl.textContent = hon ? fmtEuro(hon) : '\u2014';
    if (gwEl) gwEl.textContent = gw ? fmtEuro(gw) : '\u2014';
    // Update totalen
    let totalHon = 0, totalGw = 0;
    document.querySelectorAll('[data-fin-hon]').forEach(el => {
      const mid = el.dataset.finHon;
      const mx = STATE.data.matches[mid]; if (!mx) return;
      const mh = md.finEdits[mid]?.honorarium ?? mx.honorarium ?? 0;
      const mp = stagePct(mx.stage);
      totalHon += mh; totalGw += Math.round(mh * mp / 100);
    });
    const thEl = document.querySelector('[data-fin-total-hon]');
    const tgEl = document.querySelector('[data-fin-total-gw]');
    if (thEl) thEl.textContent = fmtEuro(totalHon);
    if (tgEl) tgEl.textContent = fmtEuro(totalGw);
  }
};

function kansStageColor(kansId) {
  const order = {matches:1,verkennend:2,offerte:3,actief:4};
  let best = 0, bestStage = null;
  objToArr(STATE.data.matches).filter(m => m.kid === kansId).forEach(m => {
    const o = order[m.stage]||0;
    if (o > best) { best = o; bestStage = m.stage; }
  });
  return bestStage ? stageColor(bestStage) : '#c22d0b';
}

async function initMapModal() {
  const container = document.getElementById('map-container');
  if (!container || typeof L === 'undefined') return;
  const map = L.map('map-container').setView([51.92, 4.48], 11);
  const tileUrl = STATE.ui.dark
    ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
    : 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png';
  L.tileLayer(tileUrl, {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>'
  }).addTo(map);
  STATE.ui._mapInstance = map;

  const allK = sortedArr(STATE.data.kansen).filter(k => k.adres);
  const markers = [];
  const statusEl = document.getElementById('map-status');
  let geocoded = 0;

  // Phase 1: add cached markers immediately
  const toGeocode = [];
  allK.forEach(k => {
    if (k.lat && k.lng) {
      markers.push(addMapMarker(map, k, k.lat, k.lng));
    } else {
      toGeocode.push(k);
    }
  });
  if (markers.length > 0) fitMapBounds(map, markers);

  // Phase 2: geocode uncached addresses progressively
  for (let i = 0; i < toGeocode.length; i++) {
    if (!STATE.ui._mapInstance) return; // modal closed
    const k = toGeocode[i];
    if (statusEl) statusEl.textContent = `Adressen laden: ${++geocoded}/${toGeocode.length}...`;
    const coords = await geocodeAddress(k.adres);
    if (coords) {
      // Cache in Firebase
      fbUpdate(`kansen/${k.id}`, {lat:coords.lat, lng:coords.lng});
      markers.push(addMapMarker(map, k, coords.lat, coords.lng));
      if (markers.length <= 3 || i === toGeocode.length - 1) fitMapBounds(map, markers);
    }
    if (i < toGeocode.length - 1) await delay(1100); // Nominatim rate limit
  }
  const noAddr = sortedArr(STATE.data.kansen).filter(k => !k.adres).length;
  if (statusEl) statusEl.textContent = `${markers.length}/${allK.length} locatie(s) geladen` + (noAddr ? ` \u00B7 ${noAddr} zonder adres` : '');
}

function addMapMarker(map, kans, lat, lng) {
  const fillColor = kansStageColor(kans.id);
  const kansMatches = objToArr(STATE.data.matches).filter(m => m.kid === kans.id);
  // Alert-status bepalen: rood/oranje rand als koppelingen onvoldoende
  let borderColor = '#fff';
  if (kansMatches.length > 0) {
    const worstAlert = kansMatches.reduce((w, m) => { const al = getAlertLevel(m); return al==='rood'?'rood':al==='oranje'&&w!=='rood'?'oranje':w; }, 'ok');
    if (worstAlert === 'rood') borderColor = '#c22d0b';
    else if (worstAlert === 'oranje') borderColor = '#c97b1a';
  }
  const stageInfo = kansMatches.length > 0 ? kansMatches.map(m => {
    const s = STAGES.find(st => st.id === m.stage);
    return `<span style="display:inline-block;padding:1px 6px;font-size:9px;border-radius:2px;color:${stageColor(m.stage)};background:${stageBg(m.stage)};border:1px solid ${stageColor(m.stage)}33">${esc(s?.short||'?')}</span>`;
  }).join(' ') : '<span style="font-size:10px;color:#c22d0b;font-weight:500">Ongematchte kans</span>';
  const marker = L.circleMarker([lat, lng], {
    radius: 8, fillColor: fillColor, color: borderColor, weight: borderColor==='#fff'?2:3, fillOpacity: kansMatches.length===0?1:0.85
  }).addTo(map);
  // Alert info voor popup
  let alertInfo = '';
  if (kansMatches.length > 0) {
    kansMatches.forEach(m => {
      const al = getAlertLevel(m);
      if (al === 'rood') alertInfo = `<div style="font-size:10px;color:#c22d0b;font-weight:500;margin-bottom:4px">\u26A0 Geen koppelingen</div>`;
      else if (al === 'oranje' && !alertInfo) alertInfo = `<div style="font-size:10px;color:#c97b1a;font-weight:500;margin-bottom:4px">\u26A0 Te weinig koppelingen</div>`;
    });
  }
  marker.bindPopup(`<div style="font-family:Rubik,sans-serif;min-width:180px">
    <div style="font-weight:600;font-size:13px;margin-bottom:3px">${esc(kans.name)}</div>
    <div style="font-size:11px;color:#666;margin-bottom:4px">${ico('mapPin',11)} ${esc(kans.adres)}</div>
    <div style="margin-bottom:4px">${stageInfo}</div>
    ${alertInfo}
    ${kans.omvang ? `<div style="font-size:10px;color:#888;margin-bottom:4px">BVO ${esc(kans.omvang)}m\u00B2</div>` : ''}
    <a href="#" onclick="KB.mapEditKans('${kans.id}');return false" style="color:#006f9d;font-size:11px;text-decoration:none">Bewerk kans \u2192</a>
  </div>`);
  return marker;
}
KB.mapEditKans = function(kansId) {
  if (STATE.ui._mapInstance) { STATE.ui._mapInstance.remove(); STATE.ui._mapInstance = null; }
  STATE.ui._returnToMap = true;
  const k = STATE.data.kansen[kansId];
  if (k) { STATE.ui.modal = 'editKans'; STATE.ui.modalData = {...k, id:kansId}; STATE.ui.modalExtra = null; STATE.ui.modalDirty = false; renderModal(); }
};

function fitMapBounds(map, markers) {
  if (markers.length > 0) {
    const group = L.featureGroup(markers);
    map.fitBounds(group.getBounds().pad(0.15));
  }
}

KB.exportBackup = async function() {
  const md = STATE.ui.modalData;
  try {
    // Lees ook meta, maar sluit passwordHash uit
    const metaSnap = await db.ref('meta').once('value');
    const metaVal = metaSnap.val() || {};
    delete metaVal.passwordHash;
    const backup = {
      _version: 1,
      _date: new Date().toISOString(),
      _app: 'De Koppelbaas',
      meta: metaVal,
      devTypes: STATE.data.devTypes,
      kansCats: STATE.data.kansCats,
      devs: STATE.data.devs,
      kansen: STATE.data.kansen,
      matches: STATE.data.matches,
      users: STATE.data.users
    };
    const json = JSON.stringify(backup, null, 2);
    const blob = new Blob([json], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `koppelbaas-backup-${today()}.json`;
    a.click();
    URL.revokeObjectURL(url);
    if (md) { md.bkMsg = 'Backup gedownload!'; md.bkOk = true; renderModal(); }
  } catch(e) {
    if (md) { md.bkMsg = 'Fout bij backup: ' + e.message; md.bkOk = false; renderModal(); }
  }
};

KB.exportExcel = function() {
  const md = STATE.ui.modalData;
  try {
    const matches = objToArr(STATE.data.matches).sort((a,b) => {
      const si = s => ({matches:0,verkennend:1,offerte:2,actief:3}[s]||0);
      return si(a.stage) - si(b.stage);
    });
    const kansen = STATE.data.kansen || {};
    const devs = STATE.data.devs || {};
    const sep = ';';
    const rows = [['Kans','Adres','Fase','Ontwikkelaar(s)','BVO','Honorarium','Gewogen','Volgende actie','Notitie','Aangemaakt'].join(sep)];
    matches.forEach(m => {
      const k = kansen[m.kid] || {};
      const devNames = asArr(m.links).map(did => devs[did]?.name||'?').join(', ');
      const stg = {matches:'Match',verkennend:'Verkennend',offerte:'Offerte',actief:'Actief'}[m.stage]||m.stage;
      const gw = Math.round((m.honorarium||0) * stagePct(m.stage) / 100);
      const csvVal = v => { const s = String(v==null?'':v).replace(/"/g,'""'); return s.indexOf(sep)>=0||s.indexOf('"')>=0||s.indexOf('\n')>=0 ? '"'+s+'"' : s; };
      rows.push([csvVal(k.name),csvVal(k.adres),stg,csvVal(devNames),m.bvo||'',m.honorarium||'',gw,m.nextAction||'',csvVal(m.notitie),m.createdAt||''].join(sep));
    });
    const bom = '\uFEFF';
    const blob = new Blob([bom + rows.join('\r\n')], {type:'text/csv;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `koppelbaas-${today()}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    if (md) { md.bkMsg = 'Excel gedownload!'; md.bkOk = true; renderModal(); }
  } catch(e) {
    if (md) { md.bkMsg = 'Fout bij export: ' + e.message; md.bkOk = false; renderModal(); }
  }
};

  const md = STATE.ui.modalData;
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    // Validatie
    const required = ['devTypes','kansCats','devs','kansen','matches'];
    const missing = required.filter(k => !(k in data));
    if (missing.length > 0) {
      if (md) { md.bkMsg = 'Ongeldig backup-bestand: ontbrekende data (' + missing.join(', ') + ')'; md.bkOk = false; renderModal(); }
      return;
    }
    showConfirm('Dit overschrijft ALLE huidige data.', async () => {
      try {
        const updates = {};
        if (data.meta) updates['/meta'] = data.meta;
        updates['/devTypes'] = data.devTypes || {};
        updates['/kansCats'] = data.kansCats || {};
        updates['/devs'] = data.devs || {};
        updates['/kansen'] = data.kansen || {};
        updates['/matches'] = data.matches || {};
        if (data.users) updates['/users'] = data.users;
        await db.ref().update(updates);
        const fi = document.getElementById('import-file-input'); if (fi) fi.value = '';
        STATE.ui.modal = 'admin'; STATE.ui.modalData = {bkMsg:'Backup hersteld!',bkOk:true}; renderModal();
        showToast('Backup hersteld');
      } catch(err) {
        STATE.ui.modal = 'admin'; STATE.ui.modalData = {bkMsg:'Fout bij import: '+err.message,bkOk:false}; renderModal();
      }
    });
    return;
  } catch(e) {
    if (md) { md.bkMsg = 'Fout bij import: ' + e.message; md.bkOk = false; renderModal(); }
  }
  // Reset file input
  const fi = document.getElementById('import-file-input');
  if (fi) fi.value = '';
};

KB.helpSearch = function(val) {

KB.mfCalc = function(field, value) {
  const md = STATE.ui.modalData; if (!md) return;
  md[field] = value;
  STATE.ui.modalDirty = true;
  const calcFields = ['bvo','bkm2','honPct','units','pricePerUnit'];
  if (field === 'calcType') {
    md._calcConfirmed = true;
    if (value !== 'fixed') md.honorarium = calcHon(md).honorarium;
    renderModal(); // select change: geen keyboard, re-render OK
    return;
  }
  if (calcFields.includes(field)) {
    md.honorarium = calcHon(md).honorarium;
  }
  // Inline DOM-update: honorarium veld + calculator samenvatting bijwerken, geen re-render
  const honEl = document.querySelector('input[data-calcfield="honorarium"]');
  if (honEl && field !== 'honorarium') honEl.value = md.honorarium ? md.honorarium.toLocaleString('nl-NL') : '';
  const sumEl = document.querySelector('.calc-summary');
  if (sumEl) {
    const ct = md.calcType||'bvo';
    if (ct === 'bvo' && md.bvo && md.bkm2) sumEl.textContent = `${md.bvo}m\u00B2 \u00D7 \u20AC${(md.bkm2||0).toLocaleString('nl-NL')} = ${fmtEuro(md.bvo*md.bkm2)} bouwkosten \u2192 ${md.honPct||0}% = ${fmtEuro(calcHon(md).honorarium)}`;
    else if (ct === 'units' && md.units && md.pricePerUnit) sumEl.textContent = `${md.units} units \u00D7 \u20AC${(md.pricePerUnit||0).toLocaleString('nl-NL')} = ${fmtEuro(calcHon(md).honorarium)}`;

// Confirm honorarium bij verlaten veld (blur), niet per karakter
KB.mfCalcBlur = function(field) {
  const md = STATE.ui.modalData; if (!md) return;
  const calcFields = ['bvo','bkm2','honPct','units','pricePerUnit'];
  if (!calcFields.includes(field)) return;
  if (md._origHonorium && md.honorarium !== md._origHonorium && !md._calcConfirmed) {

    showConfirm(`Honorarium wijzigt van ${fmtEuro(md._origHonorium)} naar ${fmtEuro(savedHon)}. Doorgaan?`, () => {
      md._calcConfirmed = true;

      renderModal();
    });

// Modal field helper — update modalData zonder re-render tenzij nodig
KB.mf = function(field, value) {
  if (STATE.ui.modalData) {
    STATE.ui.modalData[field] = value;
    if (!['admin','help','finOverview','actionOverview','map','sysConfirm'].includes(STATE.ui.modal)) STATE.ui.modalDirty = true;
    // Herrender modal alleen als het een veld is dat de knop-status beïnvloedt
    if (['label','short','checked'].includes(field)) {
      // Bewaar actief element + cursor positie voor focus-herstel
      const ae = document.activeElement;
      const sel = ae ? { start: ae.selectionStart, end: ae.selectionEnd } : null;
      const tag = ae ? ae.tagName : '';
      const val = ae ? ae.value : '';
      renderModal();
      // Herstel focus na re-render
      if (tag === 'INPUT' || tag === 'TEXTAREA') {
        const inputs = document.querySelectorAll('.modal-body input, .modal-body textarea');
        for (const inp of inputs) {
          if (inp.value === val && inp.tagName === tag) {
            inp.focus();
            if (sel && sel.start !== null) {
              try { inp.setSelectionRange(sel.start, sel.end); } catch(e) {}
            }
            break;
          }
        }
      }
    }
  }
};
KB.mfStage = function(newStage) {
  const md = STATE.ui.modalData;
  if (!md) return;
  const oldIdx = STAGE_ORDER[md.stage] || 0;
  const newIdx = STAGE_ORDER[newStage] || 0;
