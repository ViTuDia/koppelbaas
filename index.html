    renderModal();
  } else {
    md.stage = newStage;
    renderModal();
  }
};

// ─── EVENTS (placeholder) ────────────────────────
function setupEventListeners() {
  // ─── Resize handle (versleep scheidslijn links/rechts) ───
  let resizing = false;
  function initResize() {
    document.body.addEventListener('mousedown', e => {
      if (!e.target.closest('#resize-handle')) return;
      resizing = true;
      e.target.closest('#resize-handle').classList.add('active');
      e.preventDefault();
    });
    document.body.addEventListener('mousemove', e => {
      if (!resizing) return;
      e.preventDefault();
      const lp = document.getElementById('left-panels');
      if (!lp) return;
      const mainRect = lp.parentElement.getBoundingClientRect();
      const newWidth = Math.max(200, Math.min(e.clientX - mainRect.left, mainRect.width - 300));
      lp.style.width = newWidth + 'px';
      STATE.ui.leftPanelWidth = newWidth;
    });
    document.body.addEventListener('mouseup', () => {
      if (resizing) {
        resizing = false;
        const h = document.getElementById('resize-handle');
        if (h) h.classList.remove('active');
      }
    });
    // Touch support
    let resizeTouchId = null;
    document.body.addEventListener('touchstart', e => {
      if (!e.target.closest('#resize-handle')) return;
      resizeTouchId = e.touches[0].identifier;
      const h = e.target.closest('#resize-handle');
      if (h) h.classList.add('active');
    }, {passive: true});
    document.body.addEventListener('touchmove', e => {
      if (resizeTouchId === null) return;
      const touch = Array.from(e.touches).find(t => t.identifier === resizeTouchId);
      if (!touch) return;
      e.preventDefault();
      const lp = document.getElementById('left-panels');
      if (!lp) return;
      const mainRect = lp.parentElement.getBoundingClientRect();
      const newWidth = Math.max(200, Math.min(touch.clientX - mainRect.left, mainRect.width - 300));
      lp.style.width = newWidth + 'px';
      STATE.ui.leftPanelWidth = newWidth;
    }, {passive: false});
    document.body.addEventListener('touchend', e => {
      if (resizeTouchId !== null) {
        resizeTouchId = null;
        const h = document.getElementById('resize-handle');
        if (h) h.classList.remove('active');
      }
    });
  }
  initResize();

  // ─── Escape sluit modals ───
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && STATE.ui.modal) {
      if (STATE.ui.modal === 'sysConfirm') {
        _confirmCb = null;
        if (_confirmPrev) {
          STATE.ui.modal = _confirmPrev.modal; STATE.ui.modalData = _confirmPrev.modalData;
          STATE.ui.modalExtra = _confirmPrev.modalExtra; STATE.ui.modalDirty = _confirmPrev.dirty;
          _confirmPrev = null; renderModal();
        } else {
          STATE.ui.modal = null; STATE.ui.modalData = null; STATE.ui.modalExtra = null;
          renderModal();
        }
        return;
      }
      if (STATE.ui._mapInstance) { STATE.ui._mapInstance.remove(); STATE.ui._mapInstance = null; }
      const returnMap = STATE.ui._returnToMap;
      if (STATE.ui.modalDirty) {
        showConfirm('Wijzigingen niet opgeslagen. Toch sluiten?', () => {
          STATE.ui.modalDirty = false;
          if (returnMap) { STATE.ui._returnToMap = false; STATE.ui.modal = 'map'; STATE.ui.modalData = null; STATE.ui.modalExtra = null; renderModal(); initMapModal(); }
          else { STATE.ui.modal = null; STATE.ui.modalData = null; STATE.ui.modalExtra = null; renderModal(); }
        }); return;
      }
      if (returnMap) { STATE.ui._returnToMap = false; STATE.ui.modal = 'map'; STATE.ui.modalData = null; STATE.ui.modalExtra = null; STATE.ui.modalDirty = false; renderModal(); initMapModal(); }
      else { STATE.ui.modal = null; STATE.ui.modalData = null; STATE.ui.modalExtra = null; STATE.ui.modalDirty = false; renderModal(); }
    }
  });

  // ─── Dubbelklik = bewerken ───
  document.body.addEventListener('dblclick', e => {
    const devItem = e.target.closest('[data-action="selectDev"]');
    if (devItem) {
      const id = devItem.dataset.id;
      const dev = STATE.data.devs[id];
      if (dev) { STATE.ui.modal = 'editDev'; STATE.ui.modalData = {...dev, id}; STATE.ui.modalExtra = null; STATE.ui.modalDirty = false; renderModal(); }
      return;
    }
    const kansItem = e.target.closest('[data-action="toggleKansCollapse"]');
    if (kansItem) {
      const id = kansItem.dataset.id;
      const k = STATE.data.kansen[id];
      if (k) { STATE.ui.modal = 'editKans'; STATE.ui.modalData = {...k, id}; STATE.ui.modalExtra = null; STATE.ui.modalDirty = false; renderModal(); }
      return;
    }
  });

  // ─── Mobiel: swipe tussen tabs ───
  let swipeStartX = 0, swipeStartY = 0;
  const MOB_TABS_ORDER = ['devs','kansen','pipeline'];
  document.body.addEventListener('touchstart', e => {
    if (!isMob()) return;
    // Niet swipen als er een drag bezig is
    if (touchDragEl) return;
    swipeStartX = e.touches[0].clientX;
    swipeStartY = e.touches[0].clientY;
  }, {passive: true});
  document.body.addEventListener('touchend', e => {
    if (!isMob() || touchDragEl) return;
    const dx = e.changedTouches[0].clientX - swipeStartX;
    const dy = Math.abs(e.changedTouches[0].clientY - swipeStartY);
    if (Math.abs(dx) > 80 && dy < 60) {
      const curIdx = MOB_TABS_ORDER.indexOf(STATE.ui.mobTab);
      if (dx < 0 && curIdx < MOB_TABS_ORDER.length - 1) {
        KB.mobSwitch(MOB_TABS_ORDER[curIdx + 1]);
      } else if (dx > 0 && curIdx > 0) {
        KB.mobSwitch(MOB_TABS_ORDER[curIdx - 1]);
      }
    }
  }, {passive: true});

  // ─── Click delegation ───
  document.body.addEventListener('click', e => {
    const el = e.target.closest('[data-action]');
    if (!el) return;
    const action = el.dataset.action;
    const id = el.dataset.id;
    e.stopPropagation();

    // Sluit header-menu bij klik op iets anders dan het menu zelf
    if (STATE.ui.headerMenu && action !== 'toggleHeaderMenu') { STATE.ui.headerMenu = false; render(); }

    switch(action) {
      // Selectie
      case 'selectDev':
        if (isMob()) break; // geen selectie-highlight op mobiel
        STATE.ui.selectedMatch = null;
        STATE.ui.selectedDev = STATE.ui.selectedDev === id ? null : id;
        render(); break;
      case 'selectMatch': {
        if (isMob()) break; // geen selectie-highlight op mobiel
        const inner = e.target.closest('[data-action]');
        if (inner && inner !== el) break;
        STATE.ui.selectedDev = null;
        STATE.ui.selectedMatch = STATE.ui.selectedMatch === id ? null : id;
        render(); break;
      }
      case 'clearSelection':
        STATE.ui.selectedDev = null; STATE.ui.selectedMatch = null;
        render(); break;

      // Collapse
      case 'collapseAll': {
        const val = el.dataset.val === '1';
        const updates = {};
        objToArr(STATE.data.matches).forEach(m => { updates[`matches/${m.id}/col`] = val; });
        if (Object.keys(updates).length > 0) fbMulti(updates);
        const unm = unmatchedKansen();
        unm.forEach(k => STATE.ui.collapsedKansen[k.id] = val);
        if (!val) STATE.ui.collapsedKansen = {};
        render(); break;
      }
      case 'collapseCol': {
        const stageId = id;
        const sm = objToArr(STATE.data.matches).filter(m => m.stage === stageId);
        const allC = sm.length > 0 && sm.every(m => m.col);
        const updates = {};
        sm.forEach(m => { updates[`matches/${m.id}/col`] = !allC; });
        if (Object.keys(updates).length > 0) fbMulti(updates);
        break;
      }
      case 'collapseAllDevTypes': {
        const dts2 = sortedArr(STATE.data.devTypes);
        const allF2 = dts2.every(t => STATE.ui.collapsedDevTypes[t.id]);
        dts2.forEach(t => STATE.ui.collapsedDevTypes[t.id] = !allF2);
        if (allF2) STATE.ui.collapsedDevTypes = {};
        render(); break;
      }
      case 'toggleDevTypeCollapse':
        STATE.ui.collapsedDevTypes[id] = !STATE.ui.collapsedDevTypes[id];
        render(); break;
      case 'collapseAllKansen': {
        const unm = unmatchedKansen();
        const allF = unm.every(k => STATE.ui.collapsedKansen[k.id]);
        unm.forEach(k => STATE.ui.collapsedKansen[k.id] = !allF);
        if (allF) STATE.ui.collapsedKansen = {};
        render(); break;
      }
      case 'collapseCatKansen': {
        const catId = id;
        const unm = unmatchedKansen().filter(k => k.cid === catId);
        const allF = unm.every(k => STATE.ui.collapsedKansen[k.id]);
        unm.forEach(k => STATE.ui.collapsedKansen[k.id] = !allF);
        render(); break;
      }
      case 'toggleKansCollapse':
        STATE.ui.collapsedKansen[id] = !STATE.ui.collapsedKansen[id];
        render(); break;
      case 'toggleCalc': {
        const md = STATE.ui.modalData;
        if (md) { md._calcOpen = !md._calcOpen; renderModal(); }
        break;
      }
      case 'toggleMatchCollapse':
        fbUpdate(`matches/${id}`, {col: !(STATE.data.matches[id]?.col)});
        break;
      case 'toggleLock': {
        if (id) { fbUpdate(`matches/${id}`, {locked: !(STATE.data.matches[id]?.locked)}); break; }
        fbUpdate('meta/lockEnabled', !lockEnabled()).then(() => { renderModal(); render(); });
        break;
      }

      // Header
      case 'toggleHeaderMenu':
        STATE.ui.headerMenu = !STATE.ui.headerMenu; render(); break;
      case 'toggleDark':
        STATE.ui.dark = !STATE.ui.dark; STATE.ui.headerMenu = false;
        localStorage.setItem('kb_dark', STATE.ui.dark ? '1' : '0');
        applyTheme(); render(); break;
      case 'print': STATE.ui.headerMenu = false; render(); setTimeout(()=>window.print(),100); break;
      case 'showAlerts':
        STATE.ui.modal = 'alerts'; STATE.ui.modalData = null; STATE.ui.modalExtra = null;
        renderModal(); break;
      case 'showFinOverview':
        STATE.ui.modal = 'finOverview'; STATE.ui.modalData = {finEdits:{}}; STATE.ui.modalExtra = null;
        renderModal(); break;
      case 'showActionOverview':
        STATE.ui.modal = 'actionOverview'; STATE.ui.modalData = null; STATE.ui.modalExtra = null;
        renderModal(); break;
      case 'showMap':
        STATE.ui.modal = 'map'; STATE.ui.modalData = null; STATE.ui.modalExtra = null;
        renderModal(); initMapModal(); break;
      case 'showHelp':
        STATE.ui._returnToAdmin = (STATE.ui.modal === 'admin');
        STATE.ui.modal = 'help'; STATE.ui.modalData = {helpSearch:'',helpOpen:{}}; STATE.ui.modalExtra = null;
        renderModal(); break;
      case 'toggleHelpChapter': {
        const md = STATE.ui.modalData; if (!md) break;
        if (!md.helpOpen) md.helpOpen = {};
        md.helpOpen[id] = !md.helpOpen[id];
        renderModal(); break;
      }
      case 'showAdmin':
        STATE.ui.headerMenu = false;
        STATE.ui.modal = 'admin'; STATE.ui.modalData = {oldPw:'',newPw:'',newPw2:'',pwMsg:'',pwOk:false,
          pct_matches:stagePct('matches'),pct_verkennend:stagePct('verkennend'),pct_offerte:stagePct('offerte'),pct_actief:stagePct('actief'),pctMsg:'',pctOk:false,
          def_bkm2:honDefaults().bkm2,def_honPct:honDefaults().honPct,honMsg:'',honOk:false,
          act_matches:actionDefaults().matches,act_verkennend:actionDefaults().verkennend,act_offerte:actionDefaults().offerte,act_actief:actionDefaults().actief,actMsg:'',actOk:false}; STATE.ui.modalExtra = null;
        renderModal(); break;
      case 'changePassword': {
        (async () => {
          const md = STATE.ui.modalData; if (!md) return;
          if (!md.oldPw) { md.pwMsg = 'Voer huidig wachtwoord in.'; md.pwOk = false; renderModal(); return; }
          if (!md.newPw || md.newPw.length < 4) { md.pwMsg = 'Nieuw wachtwoord: minimaal 4 tekens.'; md.pwOk = false; renderModal(); return; }
          if (md.newPw !== md.newPw2) { md.pwMsg = 'Nieuwe wachtwoorden komen niet overeen.'; md.pwOk = false; renderModal(); return; }
          try {
            const snap = await db.ref('meta/passwordHash').once('value');
            const stored = snap.val();
            const oldHash = await hashPassword(md.oldPw);
            if (oldHash !== stored) { md.pwMsg = 'Huidig wachtwoord is onjuist.'; md.pwOk = false; renderModal(); return; }
            const newHash = await hashPassword(md.newPw);
            await db.ref('meta/passwordHash').set(newHash);
            md.pwMsg = 'Wachtwoord gewijzigd!'; md.pwOk = true;
            md.oldPw = ''; md.newPw = ''; md.newPw2 = '';
            renderModal();
          } catch(err) { md.pwMsg = 'Fout: ' + err.message; md.pwOk = false; renderModal(); }
        })();
        break;
      }
      case 'saveStageKansen': {
        const md = STATE.ui.modalData; if (!md) break;
        const pcts = {matches:md.pct_matches||0,verkennend:md.pct_verkennend||0,offerte:md.pct_offerte||0,actief:md.pct_actief||0};
        fbUpdate('meta/stageKansen', pcts).then(() => {
          md.pctMsg = 'Percentages opgeslagen!'; md.pctOk = true; renderModal();
        }).catch(err => { md.pctMsg = 'Fout: '+err.message; md.pctOk = false; renderModal(); });
        break;
      }
      case 'sendFeedback': {
        const md = STATE.ui.modalData; if (!md) break;
        if (!md.fbMsg || !md.fbMsg.trim()) { md.fbSent = ''; renderModal(); break; }
        const fbRef = db.ref('meta/feedback').push();
        fbRef.set({type:md.fbType||'bug', msg:md.fbMsg.trim(), at:new Date().toISOString(), ua:navigator.userAgent}).then(() => {
          md.fbMsg = ''; md.fbSent = 'Bedankt! Feedback verstuurd.';
          const mb = document.querySelector('.modal-body'); const st = mb ? mb.scrollTop : 0;
          renderModal();
          const mb2 = document.querySelector('.modal-body'); if (mb2) mb2.scrollTop = st;
        }).catch(err => {
          md.fbSent = 'Fout: '+err.message;
          const mb = document.querySelector('.modal-body'); const st = mb ? mb.scrollTop : 0;
          renderModal();
          const mb2 = document.querySelector('.modal-body'); if (mb2) mb2.scrollTop = st;
        });
        break;
      }
      case 'saveHonDefaults': {
        const md = STATE.ui.modalData; if (!md) break;
        fbUpdate('meta/honDefaults', {bkm2:md.def_bkm2||2000,honPct:md.def_honPct||4}).then(() => {
          md.honMsg = 'Opgeslagen! Geldt voor nieuwe matches.'; md.honOk = true; renderModal();
        }).catch(err => { md.honMsg = 'Fout: '+err.message; md.honOk = false; renderModal(); });
        break;
      }
      case 'toggleFeature': {
        KB.toggleFeature(id);
        break;
      }
      case 'toggleActionSignaling': {
        fbUpdate('meta/actionSignaling', !actionEnabled()).then(() => renderModal());
        break;
      }
      case 'toggleFinancial': {
        fbUpdate('meta/financialEnabled', !financialEnabled()).then(() => { renderModal(); render(); });
        break;
      }
      case 'generateIcalToken': {
        const token = crypto.randomUUID();
        fbSet('meta/icalToken', token).then(() => { renderModal(); showToast('Feed-URL gegenereerd'); });
        break;
      }
      case 'saveActionDefaults': {
        const md = STATE.ui.modalData; if (!md) break;
        const vals = {};

      if (grp) return grp.querySelector('[data-drag-type="kansCat"]');
      return null;
    }
    if (dragType === 'match') {
      return el.closest('[data-drag-type="match"]');
    }
    if (dragType === 'kans') {
      // Kans naar andere kans (reorder) of naar categorie (verplaatsen)
      const kansEl = el.closest('[data-drag-type="kans"]');
      if (kansEl) return kansEl;
      const grp = el.closest('[data-kanscat-group]');
      if (grp) return grp.querySelector('[data-drag-type="kansCat"]');
      return null;
    }
    if (dragType === 'dev') {
      // Dev naar andere categorie of reorder binnen categorie
      const devEl = el.closest('[data-drag-type="dev"]');
      if (devEl) return devEl;
      const grp = el.closest('[data-devtype-group]');
      if (grp) return grp.querySelector('[data-drag-type="devType"]');
      return null;
    }
    return null;
  }

  // Check of een drop daadwerkelijk de positie zou wijzigen
  function wouldChangePosition(targetEl, clientY) {
    if (!dragType || !dragSrcId) return true;

    if (dragType === 'devType') {
      const grp = targetEl.closest('[data-devtype-group]');
      if (!grp) return false;
      const targetId = grp.dataset.devtypeGroup;
      if (targetId === dragSrcId) return false;
      const dts = sortedArr(STATE.data.devTypes);
      const fromIdx = dts.findIndex(t => t.id === dragSrcId);
      const targetIdx = dts.findIndex(t => t.id === targetId);
      if (fromIdx < 0 || targetIdx < 0) return false;
      const rect = grp.getBoundingClientRect();
      const insertAfter = clientY > rect.top + rect.height / 2;
      let toIdx = insertAfter ? targetIdx + 1 : targetIdx;
      if (fromIdx < toIdx) toIdx--;
      return fromIdx !== toIdx;
    }

    if (dragType === 'kansCat') {
      const grp = targetEl.closest('[data-kanscat-group]');
      if (!grp) return false;
      const targetId = grp.dataset.kanscatGroup;
      if (targetId === dragSrcId) return false;
      const kcs = sortedArr(STATE.data.kansCats);
      const fromIdx = kcs.findIndex(c => c.id === dragSrcId);
      const targetIdx = kcs.findIndex(c => c.id === targetId);
      if (fromIdx < 0 || targetIdx < 0) return false;
      const rect = grp.getBoundingClientRect();
      const insertAfter = clientY > rect.top + rect.height / 2;
      let toIdx = insertAfter ? targetIdx + 1 : targetIdx;
      if (fromIdx < toIdx) toIdx--;
      return fromIdx !== toIdx;
    }

    if (dragType === 'match') {
      const targetCard = targetEl.closest('[data-drag-type="match"]');
      if (!targetCard || targetCard.dataset.dragId === dragSrcId) return false;
      const col = targetEl.closest('[data-stage]');
      if (!col) return false;
      const m = STATE.data.matches[dragSrcId];
      if (!m || m.stage !== col.dataset.stage) return true; // andere kolom = altijd wijziging
      const sm = objToArr(STATE.data.matches).filter(x => x.stage === m.stage).sort((a,b) => (a.so||0) - (b.so||0));
      const fromIdx = sm.findIndex(x => x.id === dragSrcId);
      const targetIdx = sm.findIndex(x => x.id === targetCard.dataset.dragId);
      if (fromIdx < 0 || targetIdx < 0) return false;
      const rect = targetCard.getBoundingClientRect();
      const insertAfter = clientY > rect.top + rect.height / 2;
      let toIdx = insertAfter ? targetIdx + 1 : targetIdx;
      if (fromIdx < toIdx) toIdx--;
      return fromIdx !== toIdx;
    }

    if (dragType === 'kans') {
      const grp = targetEl.closest('[data-kanscat-group]');
      if (!grp) return false;
      const targetCid = grp.dataset.kanscatGroup;
      const kans = STATE.data.kansen[dragSrcId];
      if (!kans) return false;
      if (kans.cid !== targetCid) return true; // andere categorie = altijd wijziging
      // Zelfde categorie: check reorder
      const targetKans = targetEl.closest('[data-drag-type="kans"]');
      if (!targetKans || targetKans.dataset.dragId === dragSrcId) return false;
      const tk = sortedArr(STATE.data.kansen).filter(k => k.cid === targetCid);
      const fromIdx = tk.findIndex(k => k.id === dragSrcId);
      const targetIdx = tk.findIndex(k => k.id === targetKans.dataset.dragId);
      if (fromIdx < 0 || targetIdx < 0) return false;
      const rect = targetKans.getBoundingClientRect();
      const insertAfter = clientY > rect.top + rect.height / 2;
      let toIdx = insertAfter ? targetIdx + 1 : targetIdx;
      if (fromIdx < toIdx) toIdx--;
      return fromIdx !== toIdx;
    }

    if (dragType === 'dev') {
      const grp = targetEl.closest('[data-devtype-group]');
      if (!grp) return false;
      const targetTid = grp.dataset.devtypeGroup;
      const dev = STATE.data.devs[dragSrcId];
      if (!dev) return false;
      if (dev.tid !== targetTid) return true; // andere categorie = altijd wijziging
      // Zelfde categorie: check reorder
      const targetDev = targetEl.closest('[data-drag-type="dev"]');
      if (!targetDev || targetDev.dataset.dragId === dragSrcId) return false;
      const td = sortedArr(STATE.data.devs).filter(d => d.tid === targetTid);
      const fromIdx = td.findIndex(d => d.id === dragSrcId);
      const targetIdx = td.findIndex(d => d.id === targetDev.dataset.dragId);
      if (fromIdx < 0 || targetIdx < 0) return false;
      const rect = targetDev.getBoundingClientRect();
      const insertAfter = clientY > rect.top + rect.height / 2;
      let toIdx = insertAfter ? targetIdx + 1 : targetIdx;
      if (fromIdx < toIdx) toIdx--;
      return fromIdx !== toIdx;
    }

    return true;
  }

  function showIndicatorAt(targetEl, clientY) {
    if (!targetEl) return;
    const dropTarget = findDropTargetAt(targetEl);
    if (!dropTarget || dropTarget.dataset.dragId === dragSrcId) {
      // Geen geldig target gevonden — behoud huidige indicator als die er is
      return;
    }

    // Bepaal het referentie-element voor positionering
    let refEl;
    if (dragType === 'devType') refEl = dropTarget.closest('[data-devtype-group]');
    else if (dragType === 'kansCat') refEl = dropTarget.closest('[data-kanscat-group]');
    else if (dragType === 'kans') {
      refEl = dropTarget.closest('[data-drag-type="kans"]');
      if (!refEl) { const grp = dropTarget.closest('[data-kanscat-group]'); refEl = grp ? grp.querySelector('.cat-items') : null; }
    }
    else if (dragType === 'dev') {
      refEl = dropTarget.closest('[data-drag-type="dev"]');
      if (!refEl) { const grp = dropTarget.closest('[data-devtype-group]'); refEl = grp ? grp.querySelector('.cat-items') : null; }
    }
    else refEl = dropTarget;
    if (!refEl) { if (lastIndicatorId) clearDragIndicators(); return; }

    // Als refEl een cat-items container is, gebruik de eerste/laatste kaart binnenin
    if (refEl.classList.contains('cat-items')) {
      const children = Array.from(refEl.children).filter(c => !c.hasAttribute('data-empty'));
      if (children.length > 0) {
        const pos2 = clientY < refEl.getBoundingClientRect().top + refEl.getBoundingClientRect().height / 2 ? 'before' : 'after';
        refEl = pos2 === 'before' ? children[0] : children[children.length - 1];
      } else {
        // Lege categorie: toon indicator bovenaan cat-items (net onder de header)
        const catRect = refEl.getBoundingClientRect();
        const tid = dropTarget.dataset.dragId + ':empty';
        if (tid !== lastIndicatorId) {
          lastIndicatorId = tid;
          dragInd.style.left = catRect.left + 'px';
          dragInd.style.width = catRect.width + 'px';
          dragInd.style.top = (catRect.top + 4) + 'px';
          dragInd.style.display = 'block';
        }
        return;
      }
    }

    const rect = refEl.getBoundingClientRect();

    // Bepaal positie: probeer cursor-positie, als die niet geldig is probeer de andere kant
    let pos = clientY < rect.top + rect.height / 2 ? 'before' : 'after';
    if (!wouldChangePosition(targetEl, clientY)) {
      // Probeer de andere positie (simuleer cursor aan andere kant van midpoint)
      const fakeY = pos === 'before' ? rect.bottom : rect.top;
      if (wouldChangePosition(targetEl, fakeY)) {
        pos = pos === 'before' ? 'after' : 'before';
      } else {
        if (lastIndicatorId) clearDragIndicators();
        return;
      }
    }

    // Sla resolved positie op voor executeDrop
    resolvedDropPos = { pos, refEl };

    const tid = dropTarget.dataset.dragId + ':' + pos;
    if (tid !== lastIndicatorId) {
      lastIndicatorId = tid;
      // Positioneer exact in het midden van de gap tussen twee items
      let y;
      if (pos === 'before') {
        const prev = refEl.previousElementSibling;
        if (prev && !prev.hasAttribute('data-empty')) {
          const prevRect = prev.getBoundingClientRect();
          y = (prevRect.bottom + rect.top) / 2;
        } else {
          y = rect.top;
        }
      } else {
        const next = refEl.nextElementSibling;
        if (next && !next.hasAttribute('data-empty')) {
          const nextRect = next.getBoundingClientRect();
          y = (rect.bottom + nextRect.top) / 2;
        } else {
          y = rect.bottom;
        }
      }
      dragInd.style.left = rect.left + 'px';
      dragInd.style.width = rect.width + 'px';
      dragInd.style.top = (y - 1.5) + 'px';
      dragInd.style.display = 'block';
    }
  }

  // Gebruik resolved indicator-positie als die beschikbaar is, anders clientY
  function resolveInsertAfter(el, clientY) {
    if (resolvedDropPos && resolvedDropPos.refEl === el) {
      return resolvedDropPos.pos === 'after';
    }
    const rect = el.getBoundingClientRect();
    return clientY > rect.top + rect.height / 2;
  }

  // Gedeelde drop-logica (gebruikt door HTML5 drop EN touch drop)
  function executeDrop(data, targetEl, clientY) {
    // DevType reorder
    if (data.type === 'devType') {
      const grp = targetEl.closest('[data-devtype-group]');
      const targetId = grp ? grp.dataset.devtypeGroup : null;
      if (targetId && targetId !== data.id) {
        const dts = sortedArr(STATE.data.devTypes);
        const fromIdx = dts.findIndex(t => t.id === data.id);
        const targetIdx = dts.findIndex(t => t.id === targetId);
        if (fromIdx >= 0 && targetIdx >= 0) {
          const insertAfter = resolveInsertAfter(grp, clientY);
          let toIdx = insertAfter ? targetIdx + 1 : targetIdx;
          if (fromIdx < toIdx) toIdx--;
          if (fromIdx !== toIdx) {
            const item = dts.splice(fromIdx, 1)[0];
            dts.splice(toIdx, 0, item);
            const updates = {};
            dts.forEach((t, i) => { updates[`devTypes/${t.id}/so`] = i; });
            fbMulti(updates);
          }
        }
      }
      return;
    }
    // KansCat reorder
    if (data.type === 'kansCat') {
      const grp = targetEl.closest('[data-kanscat-group]');
      const targetId = grp ? grp.dataset.kanscatGroup : null;
      if (targetId && targetId !== data.id) {
        const kcs = sortedArr(STATE.data.kansCats);
        const fromIdx = kcs.findIndex(c => c.id === data.id);
        const targetIdx = kcs.findIndex(c => c.id === targetId);
        if (fromIdx >= 0 && targetIdx >= 0) {
          const insertAfter = resolveInsertAfter(grp, clientY);
          let toIdx = insertAfter ? targetIdx + 1 : targetIdx;
          if (fromIdx < toIdx) toIdx--;
          if (fromIdx !== toIdx) {
            const item = kcs.splice(fromIdx, 1)[0];
            kcs.splice(toIdx, 0, item);
            const updates = {};
            kcs.forEach((c, i) => { updates[`kansCats/${c.id}/so`] = i; });
            fbMulti(updates);
          }
        }
      }
      return;
    }

    // Kans naar andere categorie of reorder binnen categorie
    if (data.type === 'kans') {
      const grp = targetEl.closest('[data-kanscat-group]');
      if (grp) {
        const newCid = grp.dataset.kanscatGroup;
        const kans = STATE.data.kansen[data.id];
        if (!kans) return;
        if (kans.cid !== newCid) {
          const targetKans = targetEl.closest('[data-drag-type="kans"]');
          const tk = sortedArr(STATE.data.kansen).filter(k => k.cid === newCid);
          let newSo = tk.length;
          if (targetKans) {
            const targetIdx = tk.findIndex(k => k.id === targetKans.dataset.dragId);
            if (targetIdx >= 0) {
              newSo = resolveInsertAfter(targetKans, clientY) ? targetIdx + 1 : targetIdx;
            }
          }
          const updates = {};
          tk.forEach((k, i) => { const so = i >= newSo ? i + 1 : i; updates[`kansen/${k.id}/so`] = so; });
          updates[`kansen/${data.id}/cid`] = newCid;
          updates[`kansen/${data.id}/so`] = newSo;
          updates[`kansen/${data.id}/updatedAt`] = today();
          fbMulti(updates);
        } else {
          const targetKans = targetEl.closest('[data-drag-type="kans"]');
          if (!targetKans || targetKans.dataset.dragId === data.id) return;
          const tk = sortedArr(STATE.data.kansen).filter(k => k.cid === newCid);
          const fromIdx = tk.findIndex(k => k.id === data.id);
          const targetIdx = tk.findIndex(k => k.id === targetKans.dataset.dragId);
          if (fromIdx >= 0 && targetIdx >= 0) {
            const insertAfter = resolveInsertAfter(targetKans, clientY);
            let toIdx = insertAfter ? targetIdx + 1 : targetIdx;
            if (fromIdx < toIdx) toIdx--;
            if (fromIdx !== toIdx) {
              const item = tk.splice(fromIdx, 1)[0];
              tk.splice(toIdx, 0, item);
              const updates = {};
              tk.forEach((k, i) => { updates[`kansen/${k.id}/so`] = i; });
              fbMulti(updates);
            }
          }
        }
        return;
      }
      // Geen categorie-groep → doorvallen naar pipeline check hieronder
    }

    // Dev naar andere categorie of reorder
    if (data.type === 'dev') {
      const grp = targetEl.closest('[data-devtype-group]');
      if (!grp) return;
      const newTid = grp.dataset.devtypeGroup;
      const dev = STATE.data.devs[data.id];
      if (!dev) return;
      if (dev.tid !== newTid) {
        // Andere categorie: bepaal invoegpositie
        const targetDev = targetEl.closest('[data-drag-type="dev"]');
        const td = sortedArr(STATE.data.devs).filter(d => d.tid === newTid);
        let newSo = td.length; // default: onderaan
        if (targetDev) {
          const targetIdx = td.findIndex(d => d.id === targetDev.dataset.dragId);
          if (targetIdx >= 0) {
            newSo = resolveInsertAfter(targetDev, clientY) ? targetIdx + 1 : targetIdx;
          }
        }
        const updates = {};
        td.forEach((d, i) => { const so = i >= newSo ? i + 1 : i; updates[`devs/${d.id}/so`] = so; });
        updates[`devs/${data.id}/tid`] = newTid;
        updates[`devs/${data.id}/so`] = newSo;
        updates[`devs/${data.id}/updatedAt`] = today();
        fbMulti(updates);
      } else {
        // Reorder binnen zelfde categorie
        const targetDev = targetEl.closest('[data-drag-type="dev"]');
        if (!targetDev || targetDev.dataset.dragId === data.id) return;
        const td = sortedArr(STATE.data.devs).filter(d => d.tid === newTid);
        const fromIdx = td.findIndex(d => d.id === data.id);
        const targetIdx = td.findIndex(d => d.id === targetDev.dataset.dragId);
        if (fromIdx >= 0 && targetIdx >= 0) {
          const insertAfter = resolveInsertAfter(targetDev, clientY);
          let toIdx = insertAfter ? targetIdx + 1 : targetIdx;
          if (fromIdx < toIdx) toIdx--;
          if (fromIdx !== toIdx) {
            const item = td.splice(fromIdx, 1)[0];
            td.splice(toIdx, 0, item);
            const updates = {};
            td.forEach((d, i) => { updates[`devs/${d.id}/so`] = i; });
            fbMulti(updates);
          }
        }
      }
      return;
    }

    const col = targetEl.closest('[data-stage]');
    const kansenPanel = targetEl.closest('#kansen-panel');

    if (kansenPanel && data.type === 'match') {
      const m = STATE.data.matches[data.id];
      const kans = m ? STATE.data.kansen[m.kid] : null;
      STATE.ui.modal = 'confirmDelete';
      STATE.ui.modalExtra = {type:'match', id:data.id, name:kans?.name||'', fromDrag:true};
      renderModal();
    } else if (col && data.type === 'match') {
      const newStage = col.dataset.stage;
      const m = STATE.data.matches[data.id]; if (!m) return;
      if (lockEnabled() && m.locked && m.stage !== newStage) { showToast('Kaart is vergrendeld'); return; }
      if (m.stage === newStage) {
        const targetCard = targetEl.closest('[data-drag-type="match"]');
        if (targetCard && targetCard.dataset.dragId !== data.id) {
          const sm = objToArr(STATE.data.matches).filter(x => x.stage === newStage).sort((a,b) => (a.so||0) - (b.so||0));
          const fromIdx = sm.findIndex(x => x.id === data.id);
          const targetIdx = sm.findIndex(x => x.id === targetCard.dataset.dragId);
          if (fromIdx >= 0 && targetIdx >= 0) {
            const insertAfter = resolveInsertAfter(targetCard, clientY);
            let toIdx = insertAfter ? targetIdx + 1 : targetIdx;
            if (fromIdx < toIdx) toIdx--;
            if (fromIdx !== toIdx) {
              const item = sm.splice(fromIdx, 1)[0];
              sm.splice(toIdx, 0, item);
              const updates = {};
              sm.forEach((x, i) => { updates[`matches/${x.id}/so`] = i; });
              fbMulti(updates);
            }
          }
        }
      } else {
        const oldIdx = STAGE_ORDER[m.stage] || 0;
        const newIdx = STAGE_ORDER[newStage] || 0;
        if (newIdx > oldIdx && STAGE_GATES[newStage]) {
          STATE.ui.modal = 'stageGate';
          STATE.ui.modalData = {checked: false};
          STATE.ui.modalExtra = {...STAGE_GATES[newStage], dragMatchId: data.id, pendingStage: newStage};
          renderModal();
        } else {
          const cnt = objToArr(STATE.data.matches).filter(x => x.stage === newStage).length;
          const hist = [...(m.stageHistory||[]).slice(-49), {stage:newStage, at:today()}];
          fbUpdate(`matches/${data.id}`, {stage:newStage, so:cnt, stageHistory:hist, updatedAt:today()});
        }
      }
    } else if (col && data.type === 'kans') {
      const k = STATE.data.kansen[data.id]; if (!k) return;
      STATE.ui.modal = 'pickDevs';
      STATE.ui.modalData = {selectedDevs:[]};
      STATE.ui.modalExtra = {kansId:data.id, kansName:k.name||'', stage:col.dataset.stage};
      renderModal();
    }
  }

  function dragCleanup() {
    STATE.ui.dragging = null;
    STATE.ui.draggingKans = null;
    STATE.ui.dragOver = null;
    STATE.ui.dragKansen = false;
    dragType = null; dragSrcId = null;
    clearDragIndicators();
    render();
  }

  // ─── HTML5 Drag (desktop) ───
  document.body.addEventListener('dragstart', e => {
    const el = e.target.closest('[data-drag-type]');
    if (!el) return;
    dragType = el.dataset.dragType;
    dragSrcId = el.dataset.dragId;
    e.dataTransfer.setData('text/plain', JSON.stringify({type:dragType, id:dragSrcId}));
    e.dataTransfer.effectAllowed = 'move';
    if (dragType === 'match') STATE.ui.dragging = dragSrcId;
    if (dragType === 'kans') STATE.ui.draggingKans = dragSrcId;
    setTimeout(() => { el.style.opacity = '0.15'; }, 0);
  });

  document.body.addEventListener('dragend', e => {
    const el = e.target.closest('[data-drag-type]');
    if (el) el.style.opacity = '1';
    dragCleanup();
  });

  document.body.addEventListener('dragover', e => {
    // Bepaal echt target: kijk door drag-indicator heen
    let tgt = e.target;
    if (tgt === dragInd || dragInd.contains(tgt)) {
      dragInd.style.visibility = 'hidden';
      tgt = document.elementFromPoint(e.clientX, e.clientY) || tgt;
      dragInd.style.visibility = '';
    }
    const col = tgt.closest('[data-stage]');
    const kansenPanel = tgt.closest('#kansen-panel');
    const panel = tgt.closest('.panel');
    const dropTarget = findDropTargetAt(tgt);
    if (col || kansenPanel || panel || dropTarget) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      if (col && (dragType === 'match' || dragType === 'kans')) {
        if (STATE.ui.dragOver !== col.dataset.stage) {
          STATE.ui.dragOver = col.dataset.stage;
          STATE.ui.dragKansen = false;
          render();
        }
      }
      if (kansenPanel && dragType === 'match' && !STATE.ui.dragKansen) {
        STATE.ui.dragKansen = true;
        STATE.ui.dragOver = null;
        render();
      }
      showIndicatorAt(tgt, e.clientY);
    }
  });

  document.body.addEventListener('drop', e => {
    e.preventDefault();
    let data;
    try { data = JSON.parse(e.dataTransfer.getData('text/plain')); } catch { return; }
    executeDrop(data, e.target, e.clientY);
    dragCleanup();
  });

  // ─── Touch Drag (iOS/iPadOS) ───
  // Lang indrukken (200ms) = drag, snel vegen = scroll
  let touchDragEl = null, touchClone = null, touchData = null;
  let touchHoldTimer = null, touchReady = false;

  function touchCancel() {
    clearTimeout(touchHoldTimer);
    if (touchDragEl) touchDragEl.style.opacity = '1';
    if (touchClone) { touchClone.remove(); touchClone = null; }
    touchDragEl = null; touchData = null; touchReady = false; touchHoldTimer = null;
    dragCleanup();
  }

  document.body.addEventListener('touchstart', e => {
    const el = e.target.closest('[data-drag-type]');
    if (!el) return;
    touchDragEl = el;
    touchData = {type: el.dataset.dragType, id: el.dataset.dragId};
    touchReady = false;
    // Na 200ms vasthouden: drag activeren
    touchHoldTimer = setTimeout(() => {
      touchReady = true;
      haptic();
      if (window.getSelection) window.getSelection().removeAllRanges();
      dragType = touchData.type;
      dragSrcId = touchData.id;
      if (dragType === 'match') STATE.ui.dragging = dragSrcId;
      if (dragType === 'kans') STATE.ui.draggingKans = dragSrcId;
      touchDragEl.style.opacity = '0.15';
    }, 200);
  }, {passive: true});

  document.body.addEventListener('touchmove', e => {
    if (!touchDragEl || !touchData) return;

    // Nog niet lang genoeg vastgehouden → annuleer, laat scrollen
    if (!touchReady && !touchClone) {
      clearTimeout(touchHoldTimer);
      touchDragEl = null; touchData = null;
      return;
    }

    // Drag is actief → blokkeer scroll
    e.preventDefault();

    const touch = e.touches[0];

    // Eerste keer clone maken
    if (!touchClone) {
      touchClone = touchDragEl.cloneNode(true);
      touchClone.style.cssText = 'position:fixed;z-index:9999;pointer-events:none;opacity:0.8;width:'+touchDragEl.offsetWidth+'px;transform:rotate(2deg);box-shadow:0 8px 24px rgba(0,0,0,0.2);';
      document.body.appendChild(touchClone);
    }

    touchClone.style.left = (touch.clientX - touchDragEl.offsetWidth/2) + 'px';
    touchClone.style.top = (touch.clientY - 20) + 'px';

    // Indicator tonen
    const underEl = document.elementFromPoint(touch.clientX, touch.clientY);
    if (underEl) showIndicatorAt(underEl, touch.clientY);
  }, {passive: false});

  document.body.addEventListener('touchend', e => {
    clearTimeout(touchHoldTimer);
    if (!touchDragEl) return;

    const wasDragging = touchReady || touchClone;

    if (touchClone) {
      const touch = e.changedTouches[0];
      touchClone.remove();
      const underEl = document.elementFromPoint(touch.clientX, touch.clientY);
      if (underEl && touchData) {
        executeDrop(touchData, underEl, touch.clientY);
      }
      touchClone = null;
    }
    if (touchDragEl) touchDragEl.style.opacity = '1';
    touchDragEl = null; touchData = null; touchReady = false;

    // Alleen cleanup+render als er echt een drag was, anders blokkeert render() het click-event
    if (wasDragging) dragCleanup();
    else { dragType = null; dragSrcId = null; }
  });
}

// ─── INIT ────────────────────────────────────────
(function init() {
  try { initFirebase(); } catch(e) { console.error('Firebase init:', e); }

  if (localStorage.getItem('kb_session') === '1' && db) {
    try { enterApp(); } catch(e) {
      console.error('EnterApp:', e);
      localStorage.removeItem('kb_session');
      KB.checkInitialState();
    }
  } else {
    KB.checkInitialState();
  }

  // Event listeners — altijd registreren
  document.getElementById('login-pw').addEventListener('keydown', e => {
    if (e.key === 'Enter') KB.handleLogin();
  });
  document.getElementById('setup-pw2').addEventListener('keydown', e => {
    if (e.key === 'Enter') KB.handleSetup();
  });
  window.addEventListener('resize', () => updateMobView());
})();

  </script>
