<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>De Koppelbaas — ARD</title>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <style>
    :root {
      --bg: #fafaf9; --header: #d9a300; --headerTxt: #000; --headerSub: #00000088; --headerDiv: #00000033;
      --panelBg: #fff; --kaart: #fff; --kaartBorder: #e8e7e4; --selBg: #fff; --footerBg: #fff;
      --txtPrimary: #000; --txtSecondary: #878786; --zachtgrijs: #e8e7e4; --lichtgrijs: #f4f3f1;
      --geel: #d9a300; --grijs: #878786; --blauw: #006f9d; --rood: #c22d0b; --groen: #007b2f; --oranje: #c97b1a;
      --modalBg: #fff; --modalOverlay: rgba(0,0,0,0.4); --inputBorder: #e8e7e4;
      --badgeBg: #2a2a2a; --badgeTxt: #fff;
      --devSelBg: #000; --devSelTxt: #fff; --devSelBorder: #d9a300;
      --devHlBg: #e8f5e9; --devHlBorder: #007b2f;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Rubik','Helvetica Neue',sans-serif; background: var(--bg); color: var(--txtPrimary); min-height: 100vh; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: var(--zachtgrijs); border-radius: 3px; }

    /* Login */
    #login-screen { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; }
    #login-screen .logo { color: #fff; text-align: center; margin-bottom: 30px; }
    #login-screen .logo-ard { font-size: 42px; font-weight: 700; letter-spacing: 5px; }
    #login-screen .logo-sub { font-size: 10px; font-weight: 300; letter-spacing: 3px; color: #ffffff66; margin-top: 4px; }
    #login-screen input { width: 260px; padding: 10px 14px; font-size: 14px; border: 1px solid #333; border-radius: 4px; background: #111; color: #fff; font-family: inherit; text-align: center; }
    #login-screen input:focus { outline: none; border-color: var(--geel); }
    #login-screen input::placeholder { color: #555; }
    #login-screen button { margin-top: 10px; padding: 10px 32px; font-size: 13px; font-weight: 500; background: var(--geel); color: #000; border: none; border-radius: 4px; cursor: pointer; font-family: inherit; }
    #login-error { color: var(--rood); font-size: 12px; margin-top: 8px; min-height: 18px; }
    #login-screen .login-setup-msg { color: #ffffff88; font-size: 11px; margin-bottom: 12px; max-width: 260px; text-align: center; line-height: 1.5; }
    #login-screen .login-success { color: var(--groen); font-size: 12px; margin-top: 8px; min-height: 18px; }

    /* Layout */
    html, body { height: 100%; }
    #app { display: none; flex-direction: column; height: 100%; }
    .main { display: flex; flex: 1; overflow: hidden; }
    .header { background: var(--header); color: var(--headerTxt); padding: 14px 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
    .header-left { display: flex; align-items: center; gap: 18px; }
    .header-logo-ard { font-size: 26px; font-weight: 700; letter-spacing: 3px; }
    .header-logo-sub { font-size: 8px; font-weight: 300; letter-spacing: 2px; color: var(--headerSub); margin-top: 2px; }
    .header-div { width: 1px; height: 32px; background: var(--headerDiv); }
    .header-title-label { font-size: 9px; font-weight: 300; letter-spacing: 2px; color: var(--headerSub); text-transform: uppercase; }
    .header-title-name { font-size: 20px; font-weight: 300; margin-top: 2px; }
    .header-right { display: flex; gap: 16px; align-items: center; }
    .header-stat { text-align: center; }
    .header-stat-val { font-size: 20px; font-weight: 500; }
    .header-stat-lbl { font-size: 8px; color: var(--headerSub); letter-spacing: 1px; text-transform: uppercase; font-weight: 300; }

    .sel-bar { background: var(--selBg); border-bottom: 1px solid var(--zachtgrijs); padding: 10px 24px; min-height: 44px; display: flex; align-items: center; justify-content: space-between; }
    .sel-bar-name { font-size: 14px; }
    .sel-bar-slash { color: var(--geel); font-weight: 500; }

    .left-panels { width: 500px; flex-shrink: 0; display: flex; border-right: 2px solid var(--zachtgrijs); }
    .panel { width: 250px; background: var(--panelBg); overflow-y: auto; padding: 14px 10px; }
    .panel:first-child { border-right: 1px solid var(--zachtgrijs); }
    .panel-title { font-size: 13px; letter-spacing: 1px; text-transform: uppercase; font-weight: 500; }
    .panel-sub { font-size: 10px; color: var(--txtSecondary); margin-bottom: 12px; font-weight: 300; }
    .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }

    .pipeline { flex: 1; overflow-x: auto; display: flex; }
    .pipe-col { flex: 1; min-width: 200px; display: flex; flex-direction: column; border-right: 1px solid var(--zachtgrijs); }
    .pipe-col:last-child { border-right: none; }
    .pipe-col-header { padding: 14px 14px 10px; background: var(--panelBg); height: 88px; display: flex; flex-direction: column; justify-content: space-between; }
    .pipe-col-body { flex: 1; overflow-y: auto; padding: 8px 8px 32px; }

    /* Kaarten */
    .kans-card { padding: 8px 10px; margin-bottom: 4px; border-radius: 3px; border: 1px solid var(--kaartBorder); background: var(--kaart); cursor: grab; transition: opacity 0.12s; }
    .match-card { margin-bottom: 8px; border-radius: 4px; cursor: grab; transition: all 0.12s; border: 1px solid var(--zachtgrijs); }

    /* Dev items */
    .dev-item { padding: 7px 10px; margin-left: 28px; margin-bottom: 2px; border-radius: 3px; cursor: pointer; transition: all 0.12s; display: flex; justify-content: space-between; align-items: center; }
    .dev-type-header { display: flex; align-items: center; gap: 5px; margin-bottom: 6px; }

    /* Badge */
    .badge { display: inline-flex; align-items: center; justify-content: center; border-radius: 2px; background: var(--badgeBg); color: var(--badgeTxt); font-weight: 500; flex-shrink: 0; letter-spacing: 0.5px; }
    .badge-sm { width: 18px; height: 18px; font-size: 8px; }
    .badge-md { width: 22px; height: 22px; font-size: 10px; }
    .badge-lg { width: 24px; height: 24px; font-size: 10px; }

    /* Stage badge */
    .stage-badge { padding: 2px 8px; font-size: 9px; font-weight: 500; border-radius: 2px; text-transform: uppercase; letter-spacing: 0.5px; flex-shrink: 0; white-space: nowrap; }

    /* Knoppen */
    .btn { padding: 8px 16px; font-size: 12px; font-weight: 500; border: none; border-radius: 3px; cursor: pointer; font-family: inherit; }
    .btn-sm { padding: 3px 8px; font-size: 10px; }
    .btn-xs { padding: 2px 6px; font-size: 10px; }
    .btn-black { background: #000; color: #fff; }
    .btn-grey { background: var(--lichtgrijs); color: var(--grijs); }
    .btn-red { background: rgba(194,45,11,0.08); color: var(--rood); }
    .btn-match { color: var(--geel); background: rgba(217,163,0,0.09); border: 1px solid rgba(217,163,0,0.2); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500; }
    .btn-icon { background: none; border: none; cursor: pointer; font-size: 12px; color: var(--grijs); font-family: inherit; padding: 2px 4px; }
    .btn-add-col { width: 100%; padding: 9px; background: transparent; border: 2px dashed var(--zachtgrijs); border-radius: 4px; cursor: pointer; color: var(--grijs); font-size: 11px; font-family: inherit; margin-top: 4px; }
    .btn-full { width: 100%; margin-top: 4px; }

    /* Coalitie */
    .coalition { padding: 5px 7px; margin-top: 3px; border-radius: 3px; background: rgba(217,163,0,0.03); border: 1.5px dashed rgba(217,163,0,0.33); font-size: 11px; cursor: pointer; }

    /* Drop zone */
    .drop-zone-active { padding: 10px; border: 2px dashed var(--geel); border-radius: 6px; text-align: center; color: var(--geel); font-size: 12px; font-weight: 500; margin-bottom: 10px; }
    .drag-indicator { height: 3px; background: var(--geel); border-radius: 2px; margin: 2px 0; transition: opacity 0.1s; }

    /* Modals */
    .modal-overlay { position: fixed; inset: 0; background: var(--modalOverlay); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .modal { background: var(--modalBg); border-radius: 6px; width: 100%; max-height: 85vh; overflow: auto; box-shadow: 0 24px 64px rgba(0,0,0,0.3); color: var(--txtPrimary); }
    .modal-head { padding: 14px 20px; border-bottom: 1px solid var(--zachtgrijs); display: flex; justify-content: space-between; align-items: center; }
    .modal-head h3 { font-size: 16px; font-weight: 500; }
    .modal-body { padding: 20px; }
    .field { margin-bottom: 14px; }
    .field label { font-size: 10px; font-weight: 500; color: var(--txtSecondary); display: block; margin-bottom: 4px; letter-spacing: 1px; text-transform: uppercase; }
    .field input, .field select, .field textarea { width: 100%; padding: 8px 10px; font-size: 13px; border: 1px solid var(--inputBorder); border-radius: 3px; font-family: inherit; color: var(--txtPrimary); background: var(--kaart); }
    .field textarea { min-height: 50px; resize: vertical; }

    /* Checkbox */
    .cb { width: 16px; height: 16px; border-radius: 2px; border: 2px solid var(--zachtgrijs); display: inline-flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; cursor: pointer; flex-shrink: 0; }
    .cb.checked { background: var(--geel); border-color: var(--geel); color: #000; }

    /* Footer — vast onderaan window */
    .footer { position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; padding: 12px 24px; border-top: 1px solid var(--zachtgrijs); background: var(--footerBg); display: flex; justify-content: space-between; align-items: center; }
    .footer span { font-size: 12px; color: var(--grijs); font-weight: 300; }
    .pipe-col-body { padding-bottom: 32px; }

    /* Mobiele elementen (verborgen op desktop) */
    .mob-tabs { display: none; }
    .mob-stage-tabs { display: none; }
    .mob-move-btns { display: none; }

    /* Print */
    @page { size: landscape; margin: 0; }
    @media print {
      html, body { height: auto !important; overflow: visible !important; }
      body { -webkit-print-color-adjust: exact; print-color-adjust: exact; margin: 0 !important; }
      [data-noprint] { display: none !important; }
      .mob-tabs { display: none !important; }
      #login-screen { display: none !important; }
      #app { display: flex !important; flex-direction: column !important; height: auto !important; }
      .main { flex: none !important; height: auto !important; overflow: visible !important; }
      .left-panels { overflow: visible !important; height: auto !important; width: 500px !important; flex-shrink: 0 !important; }
      .panel { overflow: visible !important; height: auto !important; }
      .pipeline { overflow: visible !important; flex: 1 !important; }
      .pipe-col { overflow: visible !important; height: auto !important; }
      .pipe-col-body { overflow: visible !important; padding-bottom: 8px !important; height: auto !important; }
      .header { padding: 8px 16px !important; }
      .sel-bar { padding: 4px 16px !important; min-height: 24px !important; }
      .footer { position: static !important; padding: 4px 16px !important; }
    }

    /* ─── MOBIEL (< 768px) ─── */
    @media (max-width: 767px) {
      /* Header compact */
      .header { padding: 10px 12px; gap: 6px; }
      .header-left { gap: 10px; }
      .header-logo-ard { font-size: 20px; letter-spacing: 2px; }
      .header-logo-sub { display: none; }
      .header-div { height: 24px; }
      .header-title-name { font-size: 16px; }
      .header-right { gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
      .header-stat { display: none; }
      .header-right .btn-sm { padding: 6px 10px; font-size: 12px; min-height: 34px; }

      /* Selectiebalk compact */
      .sel-bar { padding: 6px 12px; }

      /* Main: stacked i.p.v. naast elkaar */
      .main { flex-direction: column; overflow: visible; }
      .left-panels { width: 100%; flex-direction: column; border-right: none; border-bottom: 1px solid var(--zachtgrijs); }
      .panel { width: 100%; padding: 12px; }
      .panel:first-child { border-right: none; border-bottom: 1px solid var(--zachtgrijs); }

      /* Mobiele tab-navigatie */
      .mob-tabs {
        display: flex; position: fixed; bottom: 0; left: 0; right: 0; z-index: 900;
        background: var(--panelBg); border-top: 1px solid var(--zachtgrijs);
        box-shadow: 0 -2px 8px rgba(0,0,0,0.08);
      }
      .mob-tab {
        flex: 1; padding: 8px 4px; text-align: center; font-size: 10px; font-weight: 500;
        font-family: inherit; border: none; cursor: pointer; background: transparent;
        color: var(--txtSecondary); letter-spacing: 0.5px; text-transform: uppercase;
        display: flex; flex-direction: column; align-items: center; gap: 2px;
        min-height: 52px; justify-content: center;
      }
      .mob-tab.active { color: var(--geel); }
      .mob-tab-icon { font-size: 18px; }

      /* Verberg secties op basis van actieve tab */
      .main .left-panels { display: none; }
      .main .pipeline { display: none; }
      body.mob-view-devs .main .left-panels { display: flex; flex-direction: column; }
      body.mob-view-devs .main .left-panels .panel:last-child { display: none; }
      body.mob-view-kansen .main .left-panels { display: flex; flex-direction: column; }
      body.mob-view-kansen .main .left-panels .panel:first-child { display: none; }
      body.mob-view-kansen .main .left-panels .panel:last-child { border-bottom: none; }
      body.mob-view-pipeline .main .pipeline { display: flex; flex-direction: column; }

      /* Pipeline kolommen: stacked met tabs */
      .pipeline { flex-direction: column; overflow-x: visible; }
      .pipe-col { min-width: unset; border-right: none; border-bottom: 1px solid var(--zachtgrijs); }
      .pipe-col:last-child { border-bottom: none; }
      .pipe-col-body { padding: 8px 8px 16px; }

      /* Pipeline stage tabs (mobiel) */
      .mob-stage-tabs {
        display: flex; overflow-x: auto; gap: 0; border-bottom: 1px solid var(--zachtgrijs);
        background: var(--panelBg); position: sticky; top: 0; z-index: 10;
        -webkit-overflow-scrolling: touch;
      }
      .mob-stage-tab {
        flex: 1; min-width: 0; padding: 10px 6px; text-align: center; font-size: 11px;
        font-weight: 500; font-family: inherit; border: none; cursor: pointer;
        background: transparent; color: var(--txtSecondary); white-space: nowrap;
        border-bottom: 3px solid transparent;
      }
      .mob-stage-tab.active { color: var(--txtPrimary); }

      /* Verberg niet-actieve pipeline kolommen */
      body.mob-view-pipeline .pipe-col { display: none; }
      body.mob-view-pipeline .pipe-col.mob-active { display: flex; }

      /* Kaarten: grotere tap targets */
      .kans-card { padding: 12px; margin-bottom: 6px; cursor: default; }
      .match-card { cursor: default; }
      .dev-item { padding: 10px 12px; margin-left: 0; margin-bottom: 4px; min-height: 44px; }
      .dev-type-header { min-height: 36px; }
      .btn { min-height: 36px; padding: 10px 16px; font-size: 13px; }
      .btn-sm { padding: 6px 10px; font-size: 11px; min-height: 32px; }
      .btn-xs { padding: 5px 8px; font-size: 11px; min-height: 28px; }
      .btn-icon { padding: 6px 8px; font-size: 16px; min-height: 36px; min-width: 36px; display: inline-flex; align-items: center; justify-content: center; }
      .btn-add-col { padding: 14px; font-size: 13px; }
      .cb { width: 22px; height: 22px; font-size: 12px; }
      .coalition { padding: 10px; }

      /* Touch move knoppen (vervangt drag & drop) */
      .mob-move-btns { display: flex; gap: 3px; flex-wrap: wrap; margin-top: 6px; }
      .mob-move-btn {
        padding: 5px 8px; font-size: 10px; font-weight: 500; font-family: inherit;
        border: 1px solid var(--zachtgrijs); border-radius: 3px; cursor: pointer;
        background: var(--lichtgrijs); color: var(--txtSecondary);
        text-transform: uppercase; letter-spacing: 0.3px;
      }

      /* Verberg drag-gerelateerde elementen op mobiel */
      [draggable="true"] { -webkit-user-drag: none; }
      .drop-zone-active { display: none; }

      /* iOS Safari: cursor:pointer nodig voor click-delegatie op niet-native elementen */
      [data-action] { cursor: pointer; -webkit-tap-highlight-color: transparent; }

      /* Footer: verberg op mobiel (tab-balk vervangt) */
      .footer { display: none; }

      /* Modal: full width op mobiel */
      .modal-overlay { padding: 10px; align-items: flex-end; }
      .modal { max-height: 90vh; border-radius: 12px 12px 0 0; }
      .modal-body { padding: 16px; }
      .field input, .field select, .field textarea { padding: 10px 12px; font-size: 15px; }
    }
  </style>
</head>
<body onclick="void(0)">
  <!-- Login -->
  <div id="login-screen">
    <div class="logo">
      <div class="logo-ard">ARD</div>
      <div class="logo-sub">ATELIERRUIMDENKERS</div>
    </div>
    <!-- Login-modus -->
    <div id="login-mode" style="display:none;flex-direction:column;align-items:center">
      <input type="password" id="login-pw" placeholder="Wachtwoord" autofocus>
      <button onclick="KB.handleLogin()">Openen</button>
      <div id="login-error"></div>
    </div>
    <!-- Setup-modus (eenmalig, als geen hash in Firebase) -->
    <div id="setup-mode" style="display:none;flex-direction:column;align-items:center">
      <div class="login-setup-msg">Geen wachtwoord ingesteld. Kies een wachtwoord om de app te beveiligen.</div>
      <input type="password" id="setup-pw1" placeholder="Nieuw wachtwoord" style="margin-bottom:6px">
      <input type="password" id="setup-pw2" placeholder="Herhaal wachtwoord">
      <button onclick="KB.handleSetup()">Instellen</button>
      <div id="setup-error"></div>
    </div>
    <!-- Setup gelukt -->
    <div id="setup-done" style="display:none;flex-direction:column;align-items:center">
      <div style="color:#007b2f;font-size:32px;margin-bottom:12px">&#10003;</div>
      <div style="color:#fff;font-size:14px;margin-bottom:6px">Wachtwoord ingesteld!</div>
      <div style="color:#ffffff66;font-size:11px;margin-bottom:20px">Je kunt nu inloggen.</div>
      <button onclick="document.getElementById('setup-done').style.display='none';document.getElementById('login-mode').style.display='flex';document.getElementById('login-pw').focus();" style="padding:10px 32px;font-size:13px;font-weight:500;background:#d9a300;color:#000;border:none;border-radius:4px;cursor:pointer;font-family:inherit">Naar inloggen</button>
    </div>
    <!-- Laden (even wachten op Firebase check) -->
    <div id="login-loading" style="display:flex;flex-direction:column;align-items:center">
      <div style="color:#ffffff44;font-size:12px">Laden...</div>
    </div>
  </div>

  <!-- App -->
  <div id="app">
    <div id="board-container"></div>
    <div id="modal-container"></div>
    <!-- Mobiele tab-balk -->
    <div class="mob-tabs" data-noprint>
      <button class="mob-tab active" data-tab="devs" onclick="KB.mobSwitch('devs')">
        <span class="mob-tab-icon">&#128101;</span>Devs
      </button>
      <button class="mob-tab" data-tab="kansen" onclick="KB.mobSwitch('kansen')">
        <span class="mob-tab-icon">&#127919;</span>Kansen
      </button>
      <button class="mob-tab" data-tab="pipeline" onclick="KB.mobSwitch('pipeline')">
        <span class="mob-tab-icon">&#128202;</span>Pipeline
      </button>
    </div>
  </div>

  <script>
// ════════════════════════════════════════════════════
// DE KOPPELBAAS — ARD / AtelierRuimDenkers
// ════════════════════════════════════════════════════

const KB = {};

// ─── A. CONSTANTEN ───────────────────────────────

const LIGHT = {
  zwart:"#000000",wit:"#ffffff",geel:"#d9a300",grijs:"#878786",
  blauw:"#006f9d",rood:"#c22d0b",groen:"#007b2f",oranje:"#c97b1a",
  lichtgrijs:"#f4f3f1",zachtgrijs:"#e8e7e4",bg:"#fafaf9",
  header:"#d9a300",headerTxt:"#000000",headerSub:"#00000088",headerDiv:"#00000033",
  kaart:"#ffffff",kaartBorder:"#e8e7e4",panelBg:"#ffffff",selBg:"#ffffff",footerBg:"#ffffff",
  txtPrimary:"#000000",txtSecondary:"#878786",
  devSelBg:"#000000",devSelTxt:"#ffffff",devSelBorder:"#d9a300",
  devHlBg:"#e8f5e9",devHlBorder:"#007b2f",
  modalBg:"#ffffff",modalOverlay:"rgba(0,0,0,0.4)",inputBorder:"#e8e7e4",
  badgeBg:"#2a2a2a",badgeTxt:"#ffffff",
};
const DARK = {
  zwart:"#000000",wit:"#ffffff",geel:"#d9a300",grijs:"#999999",
  blauw:"#4dabcf",rood:"#e85d3a",groen:"#2ea852",oranje:"#e0a030",
  lichtgrijs:"#2a2a2a",zachtgrijs:"#3a3a3a",bg:"#1a1a1a",
  header:"#252525",headerTxt:"#ffffff",headerSub:"#ffffff66",headerDiv:"#ffffff22",
  kaart:"#252525",kaartBorder:"#3a3a3a",panelBg:"#1e1e1e",selBg:"#222222",footerBg:"#1e1e1e",
  txtPrimary:"#e8e8e8",txtSecondary:"#999999",
  devSelBg:"#d9a300",devSelTxt:"#000000",devSelBorder:"#d9a300",
  devHlBg:"#1a3a1a",devHlBorder:"#2ea852",
  modalBg:"#2a2a2a",modalOverlay:"rgba(0,0,0,0.7)",inputBorder:"#4a4a4a",
  badgeBg:"#d9a300",badgeTxt:"#000000",
};

const STAGES = [
  {id:"matches",label:"Potentiële matches",short:"Match",sub:"Kans + ontwikkelaar",needsMin2:true,addLabel:"+ Match"},
  {id:"verkennend",label:"Verkennende gesprekken",short:"Verkennend",sub:"Gesprekken lopen",needsMin2:true,addLabel:"+ Verkennend gesprek"},
  {id:"offerte",label:"Offertetraject",short:"Offerte",sub:"Concreet verzoek",needsMin2:false,addLabel:"+ Offertetraject"},
  {id:"actief",label:"Lopend werk",short:"Werk",sub:"In uitvoering",needsMin2:false,addLabel:null},
];
const STAGE_ORDER = {matches:0,verkennend:1,offerte:2,actief:3};
const STAGE_COLORS_LIGHT = {matches:"#878786",verkennend:"#d9a300",offerte:"#006f9d",actief:"#007b2f"};

// Data helpers
function isMob() { return window.innerWidth < 768; }
function C() { return STATE.ui.dark ? DARK : LIGHT; }
function stageColor(stageId) { return (STATE.ui.dark ? STAGE_COLORS_DARK : STAGE_COLORS_LIGHT)[stageId] || '#888'; }
function stageBg(stageId) { return (STATE.ui.dark ? STAGE_BG_DARK : STAGE_BG_LIGHT)[stageId] || '#fff'; }
function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function mapsUrl(a) { return a ? `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(a)}` : null; }

function objToArr(obj) {
  if (!obj) return [];
  return Object.keys(obj).map(id => ({...obj[id], id}));
}
function sortedArr(obj) { return objToArr(obj).sort((a,b) => (a.so||0) - (b.so||0)); }

function coalIds(m) {
  const s = new Set();
  (m.coals||[]).forEach(c => (c||[]).forEach(id => s.add(id)));
  return s;
}
function indivLinks(m) {
  const ci = coalIds(m);
  return (m.links||[]).filter(id => !ci.has(id));
}
function totalLinks(m) { return indivLinks(m).length + (m.coals||[]).length; }
function matchDevIds(m) {
  const s = new Set(m.links||[]);
  (m.coals||[]).forEach(c => (c||[]).forEach(id => s.add(id)));
  return s;
}
function getAlertLevel(m) {
  const stage = STAGES.find(s => s.id === m.stage);
  const tl = totalLinks(m);
  const minNeeded = stage && stage.needsMin2 ? 2 : 1;
  if (tl >= minNeeded) return 'ok';
  return tl === 0 ? 'rood' : 'oranje';
}
function getAlarms() {
  const alarms = [];
  const kansen = STATE.data.kansen;
  objToArr(STATE.data.matches).forEach(m => {
    const al = getAlertLevel(m);
    if (al !== 'ok') {
      const k = kansen[m.kid];
      const tl = totalLinks(m);
      const stage = STAGES.find(s => s.id === m.stage);
      const min = stage && stage.needsMin2 ? 2 : 1;
      alarms.push({m, k, level: al,
        msg: `"${k?.name||'?'}" \u2014 ${tl===0?'geen match':`${tl} match`} (minstens ${min} nodig)`});
    }
  });
  return alarms;
}
function unmatchedKansen() {
  const ms = STATE.data.matches;
  const matchedKids = new Set(objToArr(ms).map(m => m.kid));
  return sortedArr(STATE.data.kansen).filter(k => !matchedKids.has(k.id));
}
function getSelectionName() {
  const {selectedDev, selectedMatch} = STATE.ui;
  if (selectedDev) { const d = STATE.data.devs[selectedDev]; return d?.name || null; }
  if (selectedMatch) { const m = STATE.data.matches[selectedMatch]; const k = m ? STATE.data.kansen[m.kid] : null; return k?.name || null; }
  return null;
}

async function hashPassword(pw) {
  const enc = new TextEncoder().encode(pw);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

function hideAllLoginPanels() {
  ['login-mode','setup-mode','setup-done','login-loading'].forEach(id => {

function showPanel(id) {

}

// Bij opstarten: check of er een hash in Firebase staat (met timeout)
KB.checkInitialState = async function() {
  try {
    if (!db) initFirebase();
    if (!db) { showPanel('setup-mode'); return; }
    // Timeout: als Firebase niet reageert binnen 5s, toon setup
    const timeout = new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), 5000));
    const fbCheck = db.ref('meta/passwordHash').once('value');
    const snap = await Promise.race([fbCheck, timeout]);
    const val = snap.val();
    if (!val) {
      showPanel('setup-mode');
    } else {
      showPanel('login-mode');
      document.getElementById('login-pw').focus();
    }
  } catch(e) {
    if (e.message === 'timeout') {
      // Firebase reageert niet — toon setup zodat gebruiker kan beginnen
      showPanel('setup-mode');
      document.getElementById('setup-error').textContent = 'Kan Firebase niet bereiken. Controleer je internetverbinding.';
    } else {
      showPanel('login-mode');
      document.getElementById('login-error').textContent = 'Verbindingsfout: ' + e.message;
    }
  }
};

KB.handleSetup = async function() {
  const pw1 = document.getElementById('setup-pw1').value.trim();
  const pw2 = document.getElementById('setup-pw2').value.trim();
  const errEl = document.getElementById('setup-error');
  errEl.textContent = '';
  if (!pw1) { errEl.textContent = 'Voer een wachtwoord in.'; return; }
  if (pw1.length < 4) { errEl.textContent = 'Minimaal 4 tekens.'; return; }
  if (pw1 !== pw2) { errEl.textContent = 'Wachtwoorden komen niet overeen.'; return; }
  errEl.style.color = '#d9a300';
  errEl.textContent = 'Bezig...';
  try {
    if (!db) initFirebase();
    const hashed = await hashPassword(pw1);
    await db.ref('meta/passwordHash').set(hashed);
    showPanel('setup-done');
  } catch(e) {
    errEl.style.color = '';
    errEl.textContent = 'Fout: ' + e.message;
  }
};

KB.handleLogin = async function() {
  const pw = document.getElementById('login-pw').value;
  if (!pw) { document.getElementById('login-error').textContent = 'Voer een wachtwoord in.'; return; }
  document.getElementById('login-error').textContent = '';
  try {
    if (!db) initFirebase();
    const snap = await db.ref('meta/passwordHash').once('value');
    const stored = snap.val();
    if (!stored) {
      showPanel('setup-mode');
      return;
    }
    const hashed = await hashPassword(pw);
    if (hashed === stored) {
      enterApp();
    } else {
      document.getElementById('login-error').textContent = 'Onjuist wachtwoord.';
    }
  } catch(e) {
    document.getElementById('login-error').textContent = 'Verbindingsfout: ' + e.message;
  }
};

function applyTheme() {
  const c = C();
  const r = document.documentElement.style;
  Object.keys(c).forEach(k => {
    // Vertaal camelCase keys naar CSS custom property namen
    const prop = '--' + k.replace(/([A-Z])/g, m => m.toLowerCase());
    r.setProperty(prop, c[k]);
  });
  // Specifieke overrides voor samengestelde namen
  r.setProperty('--bg', c.bg); r.setProperty('--header', c.header);
  r.setProperty('--headerTxt', c.headerTxt); r.setProperty('--headerSub', c.headerSub);
  r.setProperty('--headerDiv', c.headerDiv); r.setProperty('--panelBg', c.panelBg);
  r.setProperty('--kaart', c.kaart); r.setProperty('--kaartBorder', c.kaartBorder);
  r.setProperty('--selBg', c.selBg); r.setProperty('--footerBg', c.footerBg);
  r.setProperty('--txtPrimary', c.txtPrimary); r.setProperty('--txtSecondary', c.txtSecondary);
  r.setProperty('--zachtgrijs', c.zachtgrijs); r.setProperty('--lichtgrijs', c.lichtgrijs);
  r.setProperty('--geel', c.geel); r.setProperty('--grijs', c.grijs);

  r.setProperty('--groen', c.groen); r.setProperty('--oranje', c.oranje);
  r.setProperty('--modalBg', c.modalBg); r.setProperty('--modalOverlay', c.modalOverlay);
  r.setProperty('--inputBorder', c.inputBorder);
  r.setProperty('--badgeBg', c.badgeBg); r.setProperty('--badgeTxt', c.badgeTxt);
  r.setProperty('--devSelBg', c.devSelBg); r.setProperty('--devSelTxt', c.devSelTxt);
  r.setProperty('--devSelBorder', c.devSelBorder);
  r.setProperty('--devHlBg', c.devHlBg); r.setProperty('--devHlBorder', c.devHlBorder);
  document.body.style.background = c.bg;

// Mobiele view helper: body-klasse en tab-balk sync
function updateMobView() {
  if (!isMob()) {
    document.body.classList.remove('mob-view-devs','mob-view-kansen','mob-view-pipeline');
    return;
  }
  const tab = STATE.ui.mobTab;
  document.body.classList.remove('mob-view-devs','mob-view-kansen','mob-view-pipeline');
  document.body.classList.add('mob-view-' + tab);
  // Tab-balk active state
  document.querySelectorAll('.mob-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === tab);
  });
  // Pipeline stage tabs: actieve kolom
  if (tab === 'pipeline') {
    document.querySelectorAll('.pipe-col').forEach(col => {
      col.classList.toggle('mob-active', col.dataset.stage === STATE.ui.mobStage);
    });
    document.querySelectorAll('.mob-stage-tab').forEach(t => {
      t.classList.toggle('active', t.dataset.stage === STATE.ui.mobStage);
    });
  }
}

KB.mobMove = function(matchId, toStage) {
  const m = STATE.data.matches[matchId]; if (!m) return;
  const oldIdx = STAGE_ORDER[m.stage] || 0;
  const newIdx = STAGE_ORDER[toStage] || 0;
  if (newIdx > oldIdx && STAGE_GATES[toStage]) {
    STATE.ui.modal = 'stageGate';
    STATE.ui.modalData = {checked: false};
    STATE.ui.modalExtra = {...STAGE_GATES[toStage], dragMatchId: matchId, pendingStage: toStage};
    renderModal();
  } else {
    const cnt = objToArr(STATE.data.matches).filter(x => x.stage === toStage).length;
    const hist = [...(m.stageHistory||[]), {stage:toStage, at:today()}];
    fbUpdate(`matches/${matchId}`, {stage:toStage, so:cnt, stageHistory:hist, updatedAt:today()});
  }
};
KB.mobUnmatch = function(matchId) {
  STATE.ui.modal = 'confirmDelete';
  STATE.ui.modalExtra = {type:'match', id:matchId};
  renderModal();
};

      </div>`;
    });
    html += '</div>';
  }

  html += '<button data-noprint title="Nieuw ontwikkelaar-type toevoegen" class="btn btn-grey btn-sm btn-full" data-action="addDevType">+ Categorie</button>';
  html += '</div>';
  return html;
}

function renderKansenPanel(c, unmatched, kcs, matches) {
  const {dragKansen} = STATE.ui;
  const allKFolded = unmatched.length > 0 && unmatched.every(k => STATE.ui.collapsedKansen[k.id]);

  let html = `<div class="panel" id="kansen-panel">`;
  html += '<div class="panel-header"><div style="display:flex;align-items:center;gap:6px">';
  html += '<span class="panel-title">Kansen</span>';
  if (unmatched.length > 0) {
    html += `<button data-noprint class="btn-icon" style="font-size:14px;line-height:1" data-action="collapseAllKansen">${allKFolded?'\u25B8':'\u25BE'}</button>`;
  }
  html += '</div>';
  html += '<button data-noprint title="Nieuwe kans toevoegen" class="btn btn-black btn-sm" data-action="addKans">+ Nieuw</button></div>';
  html += `<div class="panel-sub">${dragKansen ? '<span style="color:'+c.geel+';font-weight:500">Loslaten = match ontkoppelen</span>' : 'Koppel aan ontwikkelaar \u2192 match.'}</div>`;

  if (dragKansen) {
    html += '<div class="drop-zone-active">Hier loslaten</div>';
  }

  // Per categorie
  kcs.forEach(cat => {
    const ck = unmatched.filter(k => k.cid === cat.id).sort((a,b) => (a.so||0) - (b.so||0));
    const allCatFolded = ck.length > 0 && ck.every(k => STATE.ui.collapsedKansen[k.id]);
    html += `<div style="margin-bottom:16px" data-kanscat-group="${cat.id}">`;
    html += `<div style="display:flex;align-items:center;gap:5px;margin-bottom:6px;cursor:grab" draggable="true" data-drag-type="kansCat" data-drag-id="${cat.id}">`;
    html += `<span style="color:${c.grijs};font-size:10px;cursor:grab;margin-right:2px" data-noprint>\u2261</span>`;
    if (ck.length > 0) {
      html += `<span style="font-size:14px;color:${c.grijs};cursor:pointer" data-action="collapseCatKansen" data-id="${cat.id}">${allCatFolded?'\u25B8':'\u25BE'}</span>`;
    }
    html += `<span style="font-size:14px;font-weight:600;flex:1;color:${c.txtPrimary}">${esc(cat.label||'Naamloos')}</span>`;
    html += `<button data-noprint title="Categorie bewerken" class="btn-icon" data-action="editKansCat" data-id="${cat.id}">\u270E</button>`;
    html += '</div>';

    ck.forEach(kans => {
      const isKC = STATE.ui.collapsedKansen[kans.id];
      const mp = mapsUrl(kans.adres);
      html += `<div class="kans-card" draggable="true" data-drag-type="kans" data-drag-id="${kans.id}" style="padding:${isKC?'6px 10px':'8px 10px'}">`;
      html += `<div style="display:flex;align-items:flex-start;gap:5px;cursor:pointer" data-action="toggleKansCollapse" data-id="${kans.id}">`;
      html += `<span style="font-size:13px;color:${c.grijs};flex-shrink:0;line-height:1.3">${isKC?'\u25B8':'\u25BE'}</span>`;
      html += `<div style="flex:1;min-width:0"><div style="font-weight:500;font-size:12px;line-height:1.3;color:${c.txtPrimary}">${esc(kans.name||'Naamloos')}</div></div>`;
      html += `<div style="display:flex;gap:3px;align-items:center;flex-shrink:0" data-noprint>`;
      html += `<button class="btn btn-match btn-xs" data-action="matchKans" data-id="${kans.id}" title="Koppel aan ontwikkelaar">Match \u2192</button>`;
      html += `<button class="btn-xs" style="background:${c.lichtgrijs};border:none;border-radius:3px;cursor:pointer;color:${c.grijs};font-family:inherit" data-action="editKans" data-id="${kans.id}" title="Kans bewerken">\u270E</button>`;
      html += '</div></div>';

      if (!isKC) {
        html += `<div style="font-size:10px;color:${c.txtSecondary};font-weight:300;margin-top:2px">${kans.omvang ? esc(kans.omvang)+'m\u00B2 \u00B7 ' : ''}${esc(kans.type||'')}</div>`;
        if (kans.adres) {
          html += `<div style="font-size:10px;margin-top:1px;font-weight:300">`;
          if (mp) html += `<a href="${mp}" target="_blank" rel="noopener noreferrer" style="color:${c.blauw};text-decoration:none">\uD83D\uDCCD ${esc(kans.adres)}</a>`;
          else html += `<span style="color:${c.txtSecondary}">\uD83D\uDCCD ${esc(kans.adres)}</span>`;
          html += '</div>';
        }
      }
      html += '</div>';
    });

    if (ck.length === 0) html += `<div style="font-size:10px;color:${c.zachtgrijs};font-style:italic">Geen kansen</div>`;
    html += '</div>';
  });

  // Geen categorie
  const uncatK = unmatched.filter(k => !kcs.find(cat => cat.id === k.cid));
  if (uncatK.length > 0) {
    html += `<div style="margin-bottom:14px"><div style="font-size:12px;color:${c.grijs};font-style:italic;margin-bottom:4px">Geen categorie</div>`;
    uncatK.forEach(kans => {
      const isKC = STATE.ui.collapsedKansen[kans.id];
      const mp = mapsUrl(kans.adres);
      html += `<div class="kans-card" draggable="true" data-drag-type="kans" data-drag-id="${kans.id}" style="padding:${isKC?'6px 10px':'8px 10px'}">`;
      html += `<div style="display:flex;align-items:flex-start;gap:5px;cursor:pointer" data-action="toggleKansCollapse" data-id="${kans.id}">`;
      html += `<span style="font-size:13px;color:${c.grijs};flex-shrink:0;line-height:1.3">${isKC?'\u25B8':'\u25BE'}</span>`;
      html += `<div style="flex:1;min-width:0"><div style="font-weight:500;font-size:12px;line-height:1.3;color:${c.txtPrimary}">${esc(kans.name||'Naamloos')}</div></div>`;
      html += `<div style="display:flex;gap:3px;align-items:center;flex-shrink:0" data-noprint>`;
      html += `<button class="btn btn-match btn-xs" data-action="matchKans" data-id="${kans.id}" title="Koppel aan ontwikkelaar">Match \u2192</button>`;
      html += `<button class="btn-xs" style="background:${c.lichtgrijs};border:none;border-radius:3px;cursor:pointer;color:${c.grijs};font-family:inherit" data-action="editKans" data-id="${kans.id}" title="Kans bewerken">\u270E</button>`;
      html += '</div></div>';
      if (!isKC) {
        html += `<div style="font-size:10px;color:${c.txtSecondary};font-weight:300;margin-top:2px">${kans.omvang ? esc(kans.omvang)+'m\u00B2 \u00B7 ' : ''}${esc(kans.type||'')}</div>`;
        if (kans.adres && mp) {
          html += `<div style="font-size:10px;margin-top:1px;font-weight:300"><a href="${mp}" target="_blank" rel="noopener noreferrer" style="color:${c.blauw};text-decoration:none">\uD83D\uDCCD ${esc(kans.adres)}</a></div>`;
        }
      }
      html += '</div>';
    });
    html += '</div>';
  }

  html += '<button data-noprint title="Nieuwe kans-categorie toevoegen" class="btn btn-grey btn-sm btn-full" data-action="addKansCat">+ Categorie</button>';
  html += '</div>';
  return html;
}

function renderPipeline(c, matches, kansen, devs, dts) {
  const {selectedDev, selectedMatch, dragOver} = STATE.ui;
  const mob = isMob();
  let html = '<div class="pipeline">';

  // Mobiele stage-tabs
  if (mob) {
    html += '<div class="mob-stage-tabs">';
    STAGES.forEach(s => {
      const sc2 = stageColor(s.id);
      const cnt = matches.filter(m => m.stage === s.id).length;
      const isAct = STATE.ui.mobStage===s.id;
      html += `<button class="mob-stage-tab ${isAct?'active':''}" data-stage="${s.id}" onclick="KB.mobStageSwitch('${s.id}')" style="color:${sc2};border-bottom:3px solid ${isAct?sc2:'transparent'}">${esc(s.short)} (${cnt})</button>`;
    });
    html += '</div>';
  }

  STAGES.forEach(stage => {
    const sc = stageColor(stage.id);
    const sm = matches.filter(m => m.stage === stage.id).sort((a,b) => (a.so||0) - (b.so||0));
    const isDT = dragOver === stage.id;
    const allC = sm.length > 0 && sm.every(m => m.col);

    html += `<div class="pipe-col" data-stage="${stage.id}" style="background:${isDT ? sc+'12' : 'transparent'}">`;

    // Kolomheader
    html += `<div class="pipe-col-header" style="border-bottom:3px solid ${sc}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:6px">
            <span style="font-size:15px;font-weight:600;color:${sc};line-height:1.2">${esc(stage.label)}</span>
            ${sm.length > 0 ? `<button data-noprint class="btn-icon" style="font-size:14px;line-height:1;flex-shrink:0" data-action="collapseCol" data-id="${stage.id}">${allC?'\u25B8':'\u25BE'}</button>` : ''}
          </div>
          <div style="font-size:10px;color:${c.grijs};margin-top:3px;font-weight:300">${esc(stage.sub)}</div>
        </div>
        <div style="font-size:24px;font-weight:300;color:${sc};flex-shrink:0">${sm.length}</div>
      </div>
      ${stage.needsMin2 ? `<div style="font-size:10px;color:${c.grijs};font-weight:300;font-style:italic">Min. 2 koppelingen</div>` : `<div style="font-size:10px;color:${c.grijs};font-weight:300;font-style:italic">Min. 1 koppeling</div>`}
    </div>`;

    // Kaarten
    html += '<div class="pipe-col-body">';
    sm.forEach(match => {
      html += renderMatchCard(c, match, stage, devs, dts);
    });

    // Toevoeg-knop
    if (stage.addLabel) {
      html += `<button data-noprint title="Nieuwe match toevoegen in ${esc(stage.label)}" class="btn-add-col" data-action="addMatch" data-stage="${stage.id}">${esc(stage.addLabel)}</button>`;
    }
    html += '</div></div>';
  });

  html += '</div>';
  return html;
}

function renderMatchCard(c, match, stage, devs, dts) {
  const kans = STATE.data.kansen[match.kid];
  if (!kans) return '';
  const sc = stageColor(stage.id);
  const sb = stageBg(stage.id);
  const tl = totalLinks(match);
  const il = indivLinks(match);
  const iDevs = devs.filter(d => il.includes(d.id));
  const al = getAlertLevel(match);
  const isC = match.col;
  const isSel = STATE.ui.selectedMatch === match.id;
  const mp = mapsUrl(kans.adres);

  // Highlight logica
  let op = '1';
  if (STATE.ui.selectedDev) {
    const linked = matchDevIds(match).has(STATE.ui.selectedDev);
    if (!linked) op = '0.15';
  }

  const bc = al==='rood' ? c.rood : al==='oranje' ? c.oranje : c.zachtgrijs;
  const bgc = al==='rood' ? c.rood+'18' : al==='oranje' ? c.oranje+'18' : c.kaart;
  const shadow = isSel ? `0 0 0 2px ${sc},0 2px 12px rgba(0,0,0,0.06)` : '0 1px 2px rgba(0,0,0,0.02)';

  let html = `<div class="match-card" draggable="true" data-drag-type="match" data-drag-id="${match.id}" data-action="selectMatch" data-id="${match.id}"
    style="padding:14px;background:${bgc};border-left:5px solid ${bc};opacity:${op};box-shadow:${shadow}">`;

  // Titel-rij (altijd zichtbaar)
  html += `<div style="display:flex;align-items:center;gap:6px;cursor:pointer">`;
  html += `<span style="font-size:14px;color:${c.grijs};flex-shrink:0;padding:2px 4px" data-action="toggleMatchCollapse" data-id="${match.id}">${isC?'\u25B8':'\u25BE'}</span>`;
  html += `<span style="font-weight:500;font-size:14px;line-height:1.3;flex:1;min-width:0">${esc(kans.name)}</span>`;
  if (isC && tl > 0) html += `<span style="font-size:10px;color:${c.grijs};flex-shrink:0">(${tl})</span>`;
  html += `<span class="stage-badge" style="color:${sc};background:${sb};border:1px solid ${sc}33">${esc(stage.short)}</span>`;
  html += '</div>';

  // Uitgeklapte inhoud
  if (!isC) {
    html += `<div style="font-size:11px;color:${c.grijs};margin-top:4px;font-weight:300">${kans.omvang ? esc(kans.omvang)+'m\u00B2 \u00B7 ' : ''}${esc(kans.type||'')}</div>`;
    if (kans.adres) {
      html += '<div style="font-size:11px;margin-top:2px;font-weight:300">';
      if (mp) html += `<a href="${mp}" target="_blank" rel="noopener noreferrer" style="color:${c.blauw};text-decoration:none">\uD83D\uDCCD ${esc(kans.adres)}</a>`;
      else html += `<span style="color:${c.grijs}">\uD83D\uDCCD ${esc(kans.adres)}</span>`;
      html += '</div>';
    }
    if (kans.contact) html += `<div style="font-size:11px;color:${c.grijs};margin-top:1px;font-weight:300">\uD83D\uDC64 ${esc(kans.contact)}</div>`;
    if (match.notitie) {
      const nt = match.notitie.length > 50 ? match.notitie.substring(0,50)+'\u2026' : match.notitie;
      html += `<div style="font-size:11px;color:${c.grijs};margin-top:2px;font-style:italic;font-weight:300">${esc(nt)}</div>`;
    }

    // Koppelingen-sectie
    html += `<div style="border-top:1px solid ${c.zachtgrijs};padding-top:8px;margin-top:6px">`;
    // Status-tekst
    const minReq = stage.needsMin2 ? 2 : 1;
    let statusTxt, statusCol;
    if (stage.needsMin2) {
      if (tl===0) { statusTxt = '\u26A0 Geen match'; statusCol = c.rood; }
      else if (tl===1) { statusTxt = '\u26A0 1 match'; statusCol = c.oranje; }
      else { statusTxt = '\u2713 '+tl+' matches'; statusCol = c.txtPrimary; }
    } else {
      statusTxt = tl + ' gekoppeld'; statusCol = c.txtPrimary;
    }
    html += `<div style="margin-bottom:5px"><span style="font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.5px;color:${statusCol}">${statusTxt}</span></div>`;

    // Individuele links
    if (iDevs.length > 0) {
      html += '<div style="display:flex;flex-direction:column;gap:3px;margin-bottom:3px">';
      iDevs.forEach(d => {
        const dt = dts.find(t => t.id === d.tid);
        html += `<div style="display:flex;align-items:center;gap:5px;font-size:11px">
          <span class="badge badge-sm">${esc(dt?.short||'?')}</span><span>${esc(d.name)}</span>
          <span data-noprint title="Ontkoppelen" style="cursor:pointer;opacity:0.3;font-size:10px" data-action="unlinkDev" data-mid="${match.id}" data-did="${d.id}">\u2715</span>
        </div>`;
      });
      html += '</div>';
    }

    // Coalities
    (match.coals||[]).forEach((coal, ci) => {
      const members = (coal||[]).map(id => devs.find(d => d.id === id)).filter(Boolean);
      html += `<div class="coalition" data-action="editCoalition" data-mid="${match.id}" data-cidx="${ci}">`;
      html += `<div style="font-weight:500;color:${c.geel};margin-bottom:4px;display:flex;justify-content:space-between">`;
      html += `<span>Coalitie <span style="font-size:8px;font-weight:300;color:${c.grijs}">(klik om te bewerken)</span></span>`;
      html += `<span data-noprint title="Coalitie verwijderen" style="cursor:pointer;color:${c.grijs};font-size:11px" data-action="deleteCoalition" data-mid="${match.id}" data-cidx="${ci}">\u2715</span>`;
      html += '</div><div style="display:flex;flex-direction:column;gap:3px">';
      members.forEach(m => {
        const dt = dts.find(t => t.id === m.tid);
        html += `<div style="display:flex;align-items:center;gap:4px"><span class="badge badge-sm">${esc(dt?.short||'?')}</span><span>${esc(m.name)}</span></div>`;
      });
      html += '</div></div>';
    });

    // Actieknoppen
    html += `<div style="border-top:1px solid ${c.zachtgrijs};margin-top:6px;padding-top:6px;display:flex;gap:5px;flex-wrap:wrap" data-noprint>`;
    html += `<button title="Coalitie toevoegen" style="font-size:11px;background:${c.lichtgrijs};border:none;border-radius:3px;padding:3px 8px;cursor:pointer;color:${c.txtPrimary};font-family:inherit;min-height:32px" data-action="addCoalition" data-mid="${match.id}">+ coalitie</button>`;
    html += `<button title="Match bewerken" style="font-size:11px;background:${c.lichtgrijs};border:none;border-radius:3px;padding:3px 8px;cursor:pointer;color:${c.txtPrimary};font-family:inherit;min-height:32px" data-action="editMatch" data-id="${match.id}">\u270E bewerk</button>`;
    html += '</div>';

    // Mobiele verplaats-knoppen (vervangt drag & drop)
    if (isMob()) {
      html += `<div class="mob-move-btns" data-noprint>`;
      STAGES.forEach(s => {
        if (s.id !== stage.id) {
          const sc2 = stageColor(s.id);
          html += `<button class="mob-move-btn" style="border-color:${sc2};color:${sc2}" onclick="KB.mobMove('${match.id}','${s.id}')">\u2192 ${esc(s.short)}</button>`;
        }
      });
      html += `<button class="mob-move-btn" style="border-color:${c.rood};color:${c.rood}" onclick="KB.mobUnmatch('${match.id}')">\u2715 Unmatch</button>`;
      html += '</div>';
    }

    html += '</div>'; // einde koppelingen-sectie
  }

  html += '</div>';
  return html;
}

// Modal field helper — update modalData zonder re-render tenzij nodig
KB.mf = function(field, value) {
  if (STATE.ui.modalData) {
    STATE.ui.modalData[field] = value;
    // Herrender modal alleen als het een veld is dat de knop-status beïnvloedt
    if (['label','short','checked'].includes(field)) {
      // Bewaar actief element + cursor positie voor focus-herstel
      const ae = document.activeElement;
      const sel = ae ? { start: ae.selectionStart, end: ae.selectionEnd } : null;
      const tag = ae ? ae.tagName : '';
      const val = ae ? ae.value : '';
      renderModal();
      // Herstel focus na re-render
      if (tag === 'INPUT' || tag === 'TEXTAREA') {
        const inputs = document.querySelectorAll('.modal-body input, .modal-body textarea');
        for (const inp of inputs) {
          if (inp.value === val && inp.tagName === tag) {
            inp.focus();
            if (sel && sel.start !== null) {
              try { inp.setSelectionRange(sel.start, sel.end); } catch(e) {}
            }
            break;
          }
        }
      }
    }
  }
};
KB.mfStage = function(newStage) {
  const md = STATE.ui.modalData;
  if (!md) return;
  const oldIdx = STAGE_ORDER[md.stage] || 0;
  const newIdx = STAGE_ORDER[newStage] || 0;
  if (newIdx > oldIdx && STAGE_GATES[newStage]) {
    // Stage gate nodig
    STATE.ui.modalExtra = { pendingStage: newStage, returnModal: 'editMatch', matchId: md.id, ...STAGE_GATES[newStage] };
    STATE.ui.modalData = { checked: false, matchId: md.id };
    STATE.ui.modal = 'stageGate';
    renderModal();
  } else {
    md.stage = newStage;
    renderModal();
  }
};

// ─── EVENTS (placeholder) ────────────────────────
function setupEventListeners() {
  // ─── Click delegation ───
  document.body.addEventListener('click', e => {
    const el = e.target.closest('[data-action]');
    if (!el) return;
    const action = el.dataset.action;
    const id = el.dataset.id;
    e.stopPropagation();

    switch(action) {
      // Selectie
      case 'selectDev':
        STATE.ui.selectedMatch = null;
        STATE.ui.selectedDev = STATE.ui.selectedDev === id ? null : id;
        if (isMob() && STATE.ui.selectedDev) { STATE.ui.mobTab = 'pipeline'; }
        render(); break;
      case 'selectMatch': {
        const inner = e.target.closest('[data-action]');
        if (inner && inner !== el) break; // geneste actie (knop, link, chevron) → niet selecteren
        STATE.ui.selectedDev = null;
        STATE.ui.selectedMatch = STATE.ui.selectedMatch === id ? null : id;
        if (isMob() && STATE.ui.selectedMatch) { STATE.ui.mobTab = 'devs'; }
        render(); break;
      }
      case 'clearSelection':
        STATE.ui.selectedDev = null; STATE.ui.selectedMatch = null;
        render(); break;

      // Collapse
      case 'collapseAll': {
        const val = el.dataset.val === '1';
        const updates = {};
        objToArr(STATE.data.matches).forEach(m => { updates[`matches/${m.id}/col`] = val; });
        if (Object.keys(updates).length > 0) fbMulti(updates);
        const unm = unmatchedKansen();
        unm.forEach(k => STATE.ui.collapsedKansen[k.id] = val);
        if (!val) STATE.ui.collapsedKansen = {};
        render(); break;
      }
      case 'collapseCol': {
        const stageId = id;
        const sm = objToArr(STATE.data.matches).filter(m => m.stage === stageId);
        const allC = sm.length > 0 && sm.every(m => m.col);
        const updates = {};
        sm.forEach(m => { updates[`matches/${m.id}/col`] = !allC; });
        if (Object.keys(updates).length > 0) fbMulti(updates);
        break;
      }
      case 'collapseAllKansen': {
        const unm = unmatchedKansen();
        const allF = unm.every(k => STATE.ui.collapsedKansen[k.id]);
        unm.forEach(k => STATE.ui.collapsedKansen[k.id] = !allF);
        if (allF) STATE.ui.collapsedKansen = {};
        render(); break;
      }
      case 'collapseCatKansen': {
        const catId = id;
        const unm = unmatchedKansen().filter(k => k.cid === catId);
        const allF = unm.every(k => STATE.ui.collapsedKansen[k.id]);
        unm.forEach(k => STATE.ui.collapsedKansen[k.id] = !allF);
        render(); break;
      }
      case 'toggleKansCollapse':
        STATE.ui.collapsedKansen[id] = !STATE.ui.collapsedKansen[id];
        render(); break;
      case 'toggleMatchCollapse':
        fbUpdate(`matches/${id}`, {col: !(STATE.data.matches[id]?.col)});
        break;

      // Header
      case 'toggleDark':
        STATE.ui.dark = !STATE.ui.dark;
        localStorage.setItem('kb_dark', STATE.ui.dark ? '1' : '0');
        applyTheme(); render(); break;
      case 'print': window.print(); break;
      case 'showAlerts':
        STATE.ui.modal = 'alerts'; STATE.ui.modalData = null; STATE.ui.modalExtra = null;
        renderModal(); break;
      case 'showAdmin':
        STATE.ui.modal = 'admin'; STATE.ui.modalData = {oldPw:'',newPw:'',newPw2:'',pwMsg:'',pwOk:false}; STATE.ui.modalExtra = null;
        renderModal(); break;
      case 'changePassword': {
        (async () => {
          const md = STATE.ui.modalData; if (!md) return;
          if (!md.oldPw) { md.pwMsg = 'Voer huidig wachtwoord in.'; md.pwOk = false; renderModal(); return; }
          if (!md.newPw || md.newPw.length < 4) { md.pwMsg = 'Nieuw wachtwoord: minimaal 4 tekens.'; md.pwOk = false; renderModal(); return; }
          if (md.newPw !== md.newPw2) { md.pwMsg = 'Nieuwe wachtwoorden komen niet overeen.'; md.pwOk = false; renderModal(); return; }
          try {
            const snap = await db.ref('meta/passwordHash').once('value');
            const stored = snap.val();
            const oldHash = await hashPassword(md.oldPw);
            if (oldHash !== stored) { md.pwMsg = 'Huidig wachtwoord is onjuist.'; md.pwOk = false; renderModal(); return; }
            const newHash = await hashPassword(md.newPw);
            await db.ref('meta/passwordHash').set(newHash);
            md.pwMsg = 'Wachtwoord gewijzigd!'; md.pwOk = true;
            md.oldPw = ''; md.newPw = ''; md.newPw2 = '';
            renderModal();
          } catch(err) { md.pwMsg = 'Fout: ' + err.message; md.pwOk = false; renderModal(); }
        })();
        break;
      }
      case 'logout':
        localStorage.removeItem('kb_session');
        location.reload();
        break;

      // Dev CRUD
      case 'addDev': {
        const dts = sortedArr(STATE.data.devTypes);
        const tid = dts[0]?.id || '';
        STATE.ui.modal = 'editDev'; STATE.ui.modalData = {name:'',tid,schaal:'',contact:'',notitie:'',isNew:true}; STATE.ui.modalExtra = null;
        renderModal(); break;
      }
      case 'editDev': {
        const dev = STATE.data.devs[id];
        if (dev) { STATE.ui.modal = 'editDev'; STATE.ui.modalData = {...dev, id}; STATE.ui.modalExtra = null; renderModal(); }
        break;
      }
      case 'saveDev': {
        const d = STATE.ui.modalData; if (!d) break;
        if (d.isNew) {
          const so = objToArr(STATE.data.devs).filter(x => x.tid === (d.tid||'')).length;
          fbPush('devs', {name:d.name||'',tid:d.tid||'',schaal:d.schaal||'',contact:d.contact||'',notitie:d.notitie||'',so,createdAt:today(),updatedAt:today(),ownerId:null});
        } else {
          fbUpdate(`devs/${d.id}`, {name:d.name||'',tid:d.tid||'',schaal:d.schaal||'',contact:d.contact||'',notitie:d.notitie||'',updatedAt:today()});
        }
        STATE.ui.modal = null; renderModal(); break;
      }
      case 'confirmDeleteDev': {
        const dev = STATE.data.devs[id];
        STATE.ui.modal = 'confirmDelete';
        STATE.ui.modalExtra = {type:'dev',id,name:dev?.name||'Naamloos'};
        renderModal(); break;
      }

      // Kans CRUD
      case 'addKans': {
        STATE.ui.modal = 'editKans'; STATE.ui.modalData = {name:'',cid:'',adres:'',omvang:'',type:'Wonen',notitie:'',contact:'',isNew:true}; STATE.ui.modalExtra = null;
        renderModal(); break;
      }
      case 'editKans': {
        const k = STATE.data.kansen[id];
        if (k) { STATE.ui.modal = 'editKans'; STATE.ui.modalData = {...k, id}; STATE.ui.modalExtra = null; renderModal(); }
        break;
      }
      case 'saveKans': {
        const k = STATE.ui.modalData; if (!k) break;
        if (k.isNew) {
          const so = objToArr(STATE.data.kansen).length;
          fbPush('kansen', {name:k.name||'',cid:k.cid||'',adres:k.adres||'',omvang:k.omvang||'',type:k.type||'Wonen',contact:k.contact||'',notitie:k.notitie||'',so,createdAt:today(),updatedAt:today(),ownerId:null});
        } else {
          fbUpdate(`kansen/${k.id}`, {name:k.name||'',cid:k.cid||'',adres:k.adres||'',omvang:k.omvang||'',type:k.type||'Wonen',contact:k.contact||'',notitie:k.notitie||'',updatedAt:today()});
        }
        STATE.ui.modal = null; renderModal(); break;
      }
      case 'confirmDeleteKans': {
        const k = STATE.data.kansen[id];
        STATE.ui.modal = 'confirmDelete';
        STATE.ui.modalExtra = {type:'kans',id,name:k?.name||'Naamloos'};
        renderModal(); break;
      }

      // Match CRUD
      case 'matchKans': {
        const k = STATE.data.kansen[id];
        STATE.ui.modal = 'pickDevs';
        STATE.ui.modalData = {selectedDevs:[]};
        STATE.ui.modalExtra = {kansId:id, kansName:k?.name||'', stage:'matches'};
        renderModal(); break;
      }
      case 'addMatch': {
        const stageId = el.dataset.stage;
        STATE.ui.modal = 'pickKans';
        STATE.ui.modalData = null;
        STATE.ui.modalExtra = {stage:stageId, title:`Kans kiezen \u2014 ${STAGES.find(s=>s.id===stageId)?.label||''}`};
        renderModal(); break;
      }
      case 'pickKans': {
        const k = STATE.data.kansen[id];
        const stageId = STATE.ui.modalExtra?.stage || 'matches';
        STATE.ui.modal = 'pickDevs';
        STATE.ui.modalData = {selectedDevs:[]};
        STATE.ui.modalExtra = {kansId:id, kansName:k?.name||'', stage:stageId};
        renderModal(); break;
      }
      case 'togglePickDev': {
        const sel = STATE.ui.modalData.selectedDevs;
        const idx = sel.indexOf(id);
        if (idx >= 0) sel.splice(idx,1); else sel.push(id);
        renderModal(); break;
      }
      case 'confirmMatch': {
        const {kansId, stage} = STATE.ui.modalExtra;
        const devIds = STATE.ui.modalData.selectedDevs;
        const stg = stage || 'matches';
        // Stage gate als de doelkolom een gate heeft (niet voor "matches" zelf)
        if (STAGE_GATES[stg]) {
          STATE.ui.modal = 'stageGate';
          STATE.ui.modalData = {checked: false};
          STATE.ui.modalExtra = {...STAGE_GATES[stg], pendingStage: stg, newMatchKansId: kansId, newMatchDevIds: devIds};
          renderModal();
        } else {
          const cnt = objToArr(STATE.data.matches).filter(m => m.stage === stg).length;
          fbPush('matches', {kid:kansId,links:devIds,coals:[],stage:stg,notitie:'',col:false,so:cnt,createdAt:today(),updatedAt:today(),stageHistory:[{stage:stg,at:today()}],ownerId:null});
          STATE.ui.modal = null; renderModal();
        }
        break;
      }
      case 'editMatch': {
        const m = STATE.data.matches[id];
        if (m) { STATE.ui.modal = 'editMatch'; STATE.ui.modalData = {...m, id, links:[...(m.links||[])], coals:JSON.parse(JSON.stringify(m.coals||[]))}; STATE.ui.modalExtra = null; renderModal(); }
        break;
      }
      case 'saveMatch': {
        const md = STATE.ui.modalData; if (!md) break;
        const origM = STATE.data.matches[md.id];
        const upd = {notitie:md.notitie||'',stage:md.stage,links:md.links||[],coals:md.coals||[],updatedAt:today()};
        // StageHistory bijwerken als stage gewijzigd
        if (origM && origM.stage !== md.stage) {
          upd.stageHistory = [...(origM.stageHistory||[]), {stage:md.stage, at:today()}];
          upd.so = objToArr(STATE.data.matches).filter(m => m.stage === md.stage).length;
        }
        fbUpdate(`matches/${md.id}`, upd);
        STATE.ui.modal = null; renderModal(); break;
      }
      case 'confirmDeleteMatch':
        STATE.ui.modal = 'confirmDelete';
        STATE.ui.modalExtra = {type:'match',id};
        renderModal(); break;
      case 'editKansFromMatch': {
        const k = STATE.data.kansen[id];
        if (k) { STATE.ui.modal = 'editKans'; STATE.ui.modalData = {...k, id}; STATE.ui.modalExtra = null; renderModal(); }
        break;
      }
      case 'toggleMatchDev': {
        const did = el.dataset.did;
        const md = STATE.ui.modalData; if (!md) break;
        const idx = (md.links||[]).indexOf(did);
        if (idx >= 0) md.links.splice(idx,1); else md.links.push(did);
        renderModal(); break;
      }
      case 'unlinkDev': {
        const mid = el.dataset.mid;
        const did = el.dataset.did;
        const m = STATE.data.matches[mid]; if (!m) break;
        const links = (m.links||[]).filter(l => l !== did);
        fbUpdate(`matches/${mid}`, {links, updatedAt:today()});
        break;
      }

      // Coalities
      case 'addCoalition': {
        const mid = el.dataset.mid;
        STATE.ui.modal = 'coalition';
        STATE.ui.modalData = {selectedDevs:[]};
        STATE.ui.modalExtra = {mid, editing:false, cidx:null};
        renderModal(); break;
      }
      case 'editCoalition': {
        const mid = el.dataset.mid;
        const cidx = parseInt(el.dataset.cidx);
        const m = STATE.data.matches[mid]; if (!m) break;
        const coal = (m.coals||[])[cidx] || [];
        STATE.ui.modal = 'coalition';
        STATE.ui.modalData = {selectedDevs:[...coal]};
        STATE.ui.modalExtra = {mid, editing:true, cidx};
        renderModal(); break;
      }
      case 'toggleCoalDev': {
        const sel = STATE.ui.modalData.selectedDevs;
        const idx = sel.indexOf(id);
        if (idx >= 0) sel.splice(idx,1); else sel.push(id);
        renderModal(); break;
      }
      case 'saveCoalition': {
        const {mid, cidx, editing} = STATE.ui.modalExtra;
        const devIds = STATE.ui.modalData.selectedDevs;
        const m = STATE.data.matches[mid]; if (!m) break;
        const coals = JSON.parse(JSON.stringify(m.coals||[]));
        if (editing && cidx !== null) coals[cidx] = devIds; else coals.push(devIds);
        fbUpdate(`matches/${mid}`, {coals, updatedAt:today()});
        STATE.ui.modal = null; renderModal(); break;
      }
      case 'deleteCoalition': {
        const mid = el.dataset.mid;
        const cidx = parseInt(el.dataset.cidx);
        STATE.ui.modal = 'confirmDelete';
        STATE.ui.modalExtra = {type:'coalition',mid,cidx};
        renderModal(); break;
      }

      // Categorie CRUD
      case 'addDevType':
        STATE.ui.modal = 'addDevType'; STATE.ui.modalData = {label:'',short:''}; STATE.ui.modalExtra = null;
        renderModal(); break;
      case 'editDevType': {
        const dt = STATE.data.devTypes[id];
        if (dt) { STATE.ui.modal = 'editDevType'; STATE.ui.modalData = {...dt, id}; STATE.ui.modalExtra = null; renderModal(); }
        break;
      }
      case 'saveNewDevType': {
        const d = STATE.ui.modalData; if (!d || !d.label) break;
        fbPush('devTypes', {label:d.label, short:(d.short||'').toUpperCase(), so:objToArr(STATE.data.devTypes).length});
        STATE.ui.modal = null; renderModal(); break;
      }
      case 'saveDevType': {
        const d = STATE.ui.modalData; if (!d) break;
        fbUpdate(`devTypes/${d.id}`, {label:d.label||'', short:(d.short||'').toUpperCase(), updatedAt:today()});
        STATE.ui.modal = null; renderModal(); break;
      }
      case 'confirmDeleteDevType':
        STATE.ui.modal = 'confirmDelete'; STATE.ui.modalExtra = {type:'devType',id};
        renderModal(); break;
      case 'addKansCat':
        STATE.ui.modal = 'addKansCat'; STATE.ui.modalData = {label:''}; STATE.ui.modalExtra = null;
        renderModal(); break;
      case 'editKansCat': {
        const kc = STATE.data.kansCats[id];
        if (kc) { STATE.ui.modal = 'editKansCat'; STATE.ui.modalData = {...kc, id}; STATE.ui.modalExtra = null; renderModal(); }
        break;
      }
      case 'saveNewKansCat': {
        const d = STATE.ui.modalData; if (!d || !d.label) break;
        fbPush('kansCats', {label:d.label, so:objToArr(STATE.data.kansCats).length});
        STATE.ui.modal = null; renderModal(); break;
      }
      case 'saveKansCat': {
        const d = STATE.ui.modalData; if (!d) break;
        fbUpdate(`kansCats/${d.id}`, {label:d.label||'', updatedAt:today()});
        STATE.ui.modal = null; renderModal(); break;
      }
      case 'confirmDeleteKansCat':
        STATE.ui.modal = 'confirmDelete'; STATE.ui.modalExtra = {type:'kansCat',id};
        renderModal(); break;

      // Delete executie
      case 'executeDelete': {
        const ex = STATE.ui.modalExtra; if (!ex) break;
        switch(ex.type) {
          case 'dev': {
            fbRemove(`devs/${ex.id}`);
            // Cascade: verwijder uit alle match links en coalities
            objToArr(STATE.data.matches).forEach(m => {
              const links = (m.links||[]).filter(l => l !== ex.id);
              const coals = (m.coals||[]).map(c => (c||[]).filter(x => x !== ex.id)).filter(c => c.length > 0);
              if (links.length !== (m.links||[]).length || coals.length !== (m.coals||[]).length) {
                fbUpdate(`matches/${m.id}`, {links, coals, updatedAt:today()});
              }
            });
            break;
          }
          case 'kans': {
            fbRemove(`kansen/${ex.id}`);
            objToArr(STATE.data.matches).filter(m => m.kid === ex.id).forEach(m => fbRemove(`matches/${m.id}`));
            break;
          }
          case 'match': fbRemove(`matches/${ex.id}`); break;
          case 'coalition': {
            const m = STATE.data.matches[ex.mid]; if (!m) break;
            const coals = JSON.parse(JSON.stringify(m.coals||[]));
            coals.splice(ex.cidx, 1);
            fbUpdate(`matches/${ex.mid}`, {coals, updatedAt:today()});
            break;
          }
          case 'devType': {
            fbRemove(`devTypes/${ex.id}`);
            objToArr(STATE.data.devs).filter(d => d.tid === ex.id).forEach(d => fbUpdate(`devs/${d.id}`, {tid:'', updatedAt:today()}));
            break;
          }
          case 'kansCat': {
            fbRemove(`kansCats/${ex.id}`);
            objToArr(STATE.data.kansen).filter(k => k.cid === ex.id).forEach(k => fbUpdate(`kansen/${k.id}`, {cid:'', updatedAt:today()}));
            break;
          }
        }
        STATE.ui.modal = null; renderModal(); break;
      }

      // Alerts
      case 'alertGoToMatch': {
        STATE.ui.modal = null; renderModal();
        const m = STATE.data.matches[id];
        if (m) { STATE.ui.modal = 'editMatch'; STATE.ui.modalData = {...m, id, links:[...(m.links||[])], coals:JSON.parse(JSON.stringify(m.coals||[]))}; STATE.ui.modalExtra = null; renderModal(); }
        break;
      }

      // Stage gate
      case 'toggleGateCheck':
        if (STATE.ui.modalData) { STATE.ui.modalData.checked = !STATE.ui.modalData.checked; renderModal(); }
        break;
      case 'confirmStageGate': {
        const ex = STATE.ui.modalExtra; if (!ex) break;
        const newStage = ex.pendingStage;
        if (ex.returnModal === 'editMatch') {
          const mid = ex.matchId;
          const m = STATE.data.matches[mid];
          if (m) {
            STATE.ui.modal = 'editMatch';
            STATE.ui.modalData = {...m, id:mid, stage:newStage, links:[...(m.links||[])], coals:JSON.parse(JSON.stringify(m.coals||[]))};
            STATE.ui.modalExtra = null;
            renderModal();
          }
        } else if (ex.dragMatchId) {
          // Drag & drop stage change
          const m = STATE.data.matches[ex.dragMatchId];
          if (m) {
            const cnt = objToArr(STATE.data.matches).filter(x => x.stage === newStage).length;
            const hist = [...(m.stageHistory||[]), {stage:newStage, at:today()}];
            fbUpdate(`matches/${ex.dragMatchId}`, {stage:newStage, so:cnt, stageHistory:hist, updatedAt:today()});
          }
          STATE.ui.modal = null; renderModal();
        } else if (ex.newMatchKansId) {
          // Nieuwe match via + knop met stage gate
          const cnt = objToArr(STATE.data.matches).filter(x => x.stage === newStage).length;
          fbPush('matches', {kid:ex.newMatchKansId,links:ex.newMatchDevIds||[],coals:[],stage:newStage,notitie:'',col:false,so:cnt,createdAt:today(),updatedAt:today(),stageHistory:[{stage:newStage,at:today()}],ownerId:null});
          STATE.ui.modal = null; renderModal();
        }
        break;
      }

      // Modal sluiten
      case 'modalBody': break; // absorbeert clicks op lege modal-ruimte
      case 'closeModal':
        STATE.ui.modal = null; STATE.ui.modalData = null; STATE.ui.modalExtra = null;
        renderModal(); break;

    }
  });

  // ─── Drag & Drop (alleen desktop) ───
  let dragType = null, dragSrcId = null; // houdt bij wat we slepen
  document.body.addEventListener('dragstart', e => {
    if (isMob()) { e.preventDefault(); return; }
    const el = e.target.closest('[data-drag-type]');
    if (!el) return;
    const type = el.dataset.dragType;
    const dragId = el.dataset.dragId;
    dragType = type;
    dragSrcId = dragId;
    e.dataTransfer.setData('text/plain', JSON.stringify({type, id:dragId}));
    e.dataTransfer.effectAllowed = 'move';
    if (type === 'match') STATE.ui.dragging = dragId;
    if (type === 'kans') STATE.ui.draggingKans = dragId;
    setTimeout(() => { el.style.opacity = '0.4'; }, 0);
  });

  document.body.addEventListener('dragend', e => {
    const el = e.target.closest('[data-drag-type]');
    if (el) el.style.opacity = '1';
    STATE.ui.dragging = null;
    STATE.ui.draggingKans = null;
    STATE.ui.dragOver = null;
    STATE.ui.dragKansen = false;
    dragType = null; dragSrcId = null;
    clearDragIndicators();
    render();
  });

  // Drop targets + visuele indicator
  let lastIndicatorId = null;
  function clearDragIndicators() {
    document.querySelectorAll('.drag-indicator').forEach(el => el.remove());
    lastIndicatorId = null;
  }

  // Vind het juiste drop-target element op basis van drag-type
  function findDropTarget(e) {
    if (!dragType) return null;
    if (dragType === 'devType') {
      // Zoek de devtype-groep wrapper
      const grp = e.target.closest('[data-devtype-group]');
      if (grp) return grp.querySelector('[data-drag-type="devType"]');
      return null;
    }
    if (dragType === 'kansCat') {
      const grp = e.target.closest('[data-kanscat-group]');
      if (grp) return grp.querySelector('[data-drag-type="kansCat"]');
      return null;
    }
    if (dragType === 'match') {
      return e.target.closest('[data-drag-type="match"]');
    }
    return null;
  }

  document.body.addEventListener('dragover', e => {
    const col = e.target.closest('[data-stage]');
    const kansenPanel = e.target.closest('#kansen-panel');
    const panel = e.target.closest('.panel');
    const dropTarget = findDropTarget(e);

    if (col || kansenPanel || panel || dropTarget) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';

      // Kolom-highlight voor match/kans drag
      if (col && (dragType === 'match' || dragType === 'kans')) {
        if (STATE.ui.dragOver !== col.dataset.stage) {
          STATE.ui.dragOver = col.dataset.stage;
          STATE.ui.dragKansen = false;
          render();
        }
      }
      if (kansenPanel && dragType === 'match' && !STATE.ui.dragKansen) {
        STATE.ui.dragKansen = true;
        STATE.ui.dragOver = null;
        render();
      }

      // Visuele drop-indicator — niet tonen op het item zelf
      if (dropTarget && dropTarget.dataset.dragId !== dragSrcId) {
        const tid = dropTarget.dataset.dragId;
        if (tid !== lastIndicatorId) {
          clearDragIndicators();
          lastIndicatorId = tid;
          // Voor devType/kansCat: indicator op de groep-wrapper
          const indicatorParent = (dragType === 'devType')
            ? dropTarget.closest('[data-devtype-group]')
            : (dragType === 'kansCat')
            ? dropTarget.closest('[data-kanscat-group]')
            : dropTarget;
          if (indicatorParent) {
            const rect = indicatorParent.getBoundingClientRect();
            const midY = rect.top + rect.height / 2;
            const indicator = document.createElement('div');
            indicator.className = 'drag-indicator';
            if (e.clientY < midY) {
              indicatorParent.parentNode.insertBefore(indicator, indicatorParent);
            } else {
              indicatorParent.parentNode.insertBefore(indicator, indicatorParent.nextSibling);
            }
          }
        }
      } else if (lastIndicatorId || (dropTarget && dropTarget.dataset.dragId === dragSrcId)) {
        clearDragIndicators();
      }
    }
  });

  document.body.addEventListener('drop', e => {
    e.preventDefault();
    let data;
    try { data = JSON.parse(e.dataTransfer.getData('text/plain')); } catch { return; }

    // ─── DevType reorder ───
    if (data.type === 'devType') {
      const grp = e.target.closest('[data-devtype-group]');
      const targetId = grp ? grp.dataset.devtypeGroup : null;
      if (targetId && targetId !== data.id) {
        const dts = sortedArr(STATE.data.devTypes);
        const fromIdx = dts.findIndex(t => t.id === data.id);
        const targetIdx = dts.findIndex(t => t.id === targetId);
        if (fromIdx >= 0 && targetIdx >= 0) {
          const rect = grp.getBoundingClientRect();
          const insertAfter = e.clientY > rect.top + rect.height / 2;
          let toIdx = insertAfter ? targetIdx + 1 : targetIdx;
          if (fromIdx < toIdx) toIdx--;
          if (fromIdx !== toIdx) {
            const item = dts.splice(fromIdx, 1)[0];
            dts.splice(toIdx, 0, item);
            const updates = {};
            dts.forEach((t, i) => { updates[`devTypes/${t.id}/so`] = i; });
            fbMulti(updates);
          }
        }
      }
    }
    // ─── KansCat reorder ───
    else if (data.type === 'kansCat') {
      const grp = e.target.closest('[data-kanscat-group]');
      const targetId = grp ? grp.dataset.kanscatGroup : null;
      if (targetId && targetId !== data.id) {
        const kcs = sortedArr(STATE.data.kansCats);
        const fromIdx = kcs.findIndex(c => c.id === data.id);
        const targetIdx = kcs.findIndex(c => c.id === targetId);
        if (fromIdx >= 0 && targetIdx >= 0) {
          const rect = grp.getBoundingClientRect();
          const insertAfter = e.clientY > rect.top + rect.height / 2;
          let toIdx = insertAfter ? targetIdx + 1 : targetIdx;
          if (fromIdx < toIdx) toIdx--;
          if (fromIdx !== toIdx) {
            const item = kcs.splice(fromIdx, 1)[0];
            kcs.splice(toIdx, 0, item);
            const updates = {};
            kcs.forEach((c, i) => { updates[`kansCats/${c.id}/so`] = i; });
            fbMulti(updates);
          }
        }
      }
    }

    const col = e.target.closest('[data-stage]');
    const kansenPanel = e.target.closest('#kansen-panel');

    if (kansenPanel && data.type === 'match') {
      // Waarschuwing: match verwijderen = devs loskoppelen
      const m = STATE.data.matches[data.id];
      const kans = m ? STATE.data.kansen[m.kid] : null;
      STATE.ui.modal = 'confirmDelete';
      STATE.ui.modalExtra = {type:'match', id:data.id, name:kans?.name||'', fromDrag:true};
      renderModal();
    } else if (col && data.type === 'match') {
      const newStage = col.dataset.stage;
      const m = STATE.data.matches[data.id]; if (!m) return;
      if (m.stage === newStage) {
        // Reorder binnen kolom — alleen als positie verandert
        const targetCard = e.target.closest('[data-drag-type="match"]');
        if (!targetCard || targetCard.dataset.dragId === data.id) break; // drop op zelf of lege ruimte → niets doen
        const sm = objToArr(STATE.data.matches).filter(x => x.stage === newStage).sort((a,b) => (a.so||0) - (b.so||0));
        const fromIdx = sm.findIndex(x => x.id === data.id);
        const targetIdx = sm.findIndex(x => x.id === targetCard.dataset.dragId);
        if (fromIdx < 0 || targetIdx < 0) break;
        // Boven of onder het target?
        const rect = targetCard.getBoundingClientRect();
        const insertAfter = e.clientY > rect.top + rect.height / 2;
        let toIdx = insertAfter ? targetIdx + 1 : targetIdx;
        // Corrigeer als bron vóór target zat
        if (fromIdx < toIdx) toIdx--;
        if (fromIdx === toIdx) break; // geen verandering
        const item = sm.splice(fromIdx, 1)[0];
        sm.splice(toIdx, 0, item);
        const updates = {};
        sm.forEach((x, i) => { updates[`matches/${x.id}/so`] = i; });
        fbMulti(updates);
      } else {
        const oldIdx = STAGE_ORDER[m.stage] || 0;
        const newIdx = STAGE_ORDER[newStage] || 0;
        if (newIdx > oldIdx && STAGE_GATES[newStage]) {
          // Stage gate
          STATE.ui.modal = 'stageGate';
          STATE.ui.modalData = {checked: false};
          STATE.ui.modalExtra = {...STAGE_GATES[newStage], dragMatchId: data.id, pendingStage: newStage};
          renderModal();
        } else {
          // Vrij verplaatsen (terug of geen gate)
          const cnt = objToArr(STATE.data.matches).filter(x => x.stage === newStage).length;
          const hist = [...(m.stageHistory||[]), {stage:newStage, at:today()}];
          fbUpdate(`matches/${data.id}`, {stage:newStage, so:cnt, stageHistory:hist, updatedAt:today()});
        }
      }
    } else if (col && data.type === 'kans') {
      // Kans naar pipeline → open dev-picker
      const k = STATE.data.kansen[data.id]; if (!k) return;
      STATE.ui.modal = 'pickDevs';
      STATE.ui.modalData = {selectedDevs:[]};
      STATE.ui.modalExtra = {kansId:data.id, kansName:k.name||'', stage:col.dataset.stage};
      renderModal();
    }

    STATE.ui.dragging = null; STATE.ui.draggingKans = null;
    STATE.ui.dragOver = null; STATE.ui.dragKansen = false;
    clearDragIndicators();
    render();
  });
}

// ─── INIT ────────────────────────────────────────
(function init() {
  try { initFirebase(); } catch(e) { console.error('Firebase init:', e); }

  if (localStorage.getItem('kb_session') === '1' && db) {
    // Sessie aanwezig → direct naar app
    try { enterApp(); } catch(e) {
      console.error('EnterApp:', e);
      localStorage.removeItem('kb_session');
      KB.checkInitialState();
    }
  } else {
    // Geen sessie → check Firebase voor hash
    KB.checkInitialState();
  }

  // Event listeners — altijd registreren
  document.getElementById('login-pw').addEventListener('keydown', e => {
    if (e.key === 'Enter') KB.handleLogin();
  });
  document.getElementById('setup-pw2').addEventListener('keydown', e => {
    if (e.key === 'Enter') KB.handleSetup();
  });
  window.addEventListener('resize', () => updateMobView());
})();

  </script>
